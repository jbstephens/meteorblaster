      _resumeState = state;
      state = PAUSED;
      pauseOverlay.classList.remove('hidden');
      document.body.classList.add('paused');
    }
  }
  let _resumeState = null;
  pauseBtn.addEventListener('click', togglePause);
  resumeBtn.addEventListener('click', togglePause);
  quitBtn.addEventListener('click', () => {
    state = MENU;
    _resumeState = null;
    menuP1Ready = false; menuP2Ready = false;
    pauseOverlay.classList.add('hidden');
    document.body.classList.remove('paused', 'in-match');
    titleOverlay.classList.remove('hidden');
    renderPilots();
  });

  function bestLine() {
    let out = '';
    for (const p of players) {
      out += (out ? '   ' : '') + `BEST (${PILOTS[p.pilotId].name}): ${hiscores[p.pilotId] || 0}`;
    }
    return out || `BEST (${PILOTS[pilotId].name}): ${hiscores[pilotId] || 0}`;
  }
  function showGameOver() {
    endTitle.textContent = 'GAME OVER';
    endSub.textContent = 'FINAL SCORE: ' + score;
    recordHi();
    endHi.textContent = bestLine();
    endOverlay.classList.remove('hidden');
    document.body.classList.remove('in-match');
  }
  function winGame() {
    state = VICTORY;
    bannerText = 'ZORG DEFEATED!';
    bannerSub  = players.length === 2
      ? `${PILOTS[players[0].pilotId].name} & ${PILOTS[players[1].pilotId].name} SAVED THE GALAXY`
      : `${PILOTS[pilotId].name} SAVED THE GALAXY`;
    bannerTime = 240;
    speakVoice(pilotId, 'Zorg defeated!');
    setTimeout(() => {
      endTitle.textContent = 'VICTORY!';
      endSub.textContent = 'FINAL SCORE: ' + score;
      recordHi();
      endHi.textContent = bestLine();
      endOverlay.classList.remove('hidden');
      document.body.classList.remove('in-match');
    }, 2400);
  }
  function recordHi() {
    // Shared team score — record it under every joined pilot so the per-pilot
    // badges stay meaningful (same scale as solo scores).
    let dirty = false;
    for (const p of players) {
      if (!hiscores[p.pilotId] || score > hiscores[p.pilotId]) {
        hiscores[p.pilotId] = score;
        dirty = true;
      }
    }
    if (dirty) saveHi(hiscores);
  }
  againBtn.addEventListener('click', startGame);
  endQuitBtn.addEventListener('click', () => {
    endOverlay.classList.add('hidden');
    document.body.classList.remove('in-match');
    state = MENU;
    menuP1Ready = false; menuP2Ready = false;
    titleOverlay.classList.remove('hidden');
    renderPilots();
  });

  // ───── gamepad (ArcadeController) ─────
  // The hosted library handles polling, edge detection, OS-specific button
  // maps, reconnect and active-input-source CSS toggling. We use the press
  // event for menus + edge-triggered actions (pause, bomb), and per-frame
  // pad(0) polling inside updatePlayer for held inputs (movement + FIRE).
  const AC = window.ArcadeController || null;
  // Cache the two logical pad handles once — AC.pad() builds a fresh closure
  // object per call, and we poll every frame in the hot loop.
  const PADS = AC ? [AC.pad(0), AC.pad(1)] : null;
  const joinHintEl = document.getElementById('joinHint');
  let _joinHintShown = false;

  function backToTitleFromEnd() {
    endOverlay.classList.add('hidden');
    document.body.classList.remove('in-match');
    state = MENU;
    menuP1Ready = false; menuP2Ready = false;
    titleOverlay.classList.remove('hidden');
    renderPilots();
  }
  function backToTitleFromPause() {
    state = MENU;
    _resumeState = null;
    menuP1Ready = false; menuP2Ready = false;
    pauseOverlay.classList.add('hidden');
    document.body.classList.remove('paused', 'in-match');
    titleOverlay.classList.remove('hidden');
    renderPilots();
  }
  function selectPilotByOffset(delta, who) {
    const cur = who === 1 ? p2PilotId : pilotId;
    const i = Math.max(0, PILOT_ORDER.indexOf(cur));
    const n = PILOT_ORDER.length;
    const next = PILOT_ORDER[((i + delta) % n + n) % n];
    if (who === 1) p2PilotId = next; else pilotId = next;
    ensureAudio();
    renderPilots();
    try { sfx.shot(); } catch {}
  }

  // Arcade drop-in on the pilot screen: pad 1 joins with any face button.
  function joinP2Menu() {
    if (p2Joined) return;
    p2Joined = true;
    menuP2Ready = false;
    if (p2PilotId === pilotId) {
      // start P2's cursor on a different pilot so both cursors are visible
      const i = PILOT_ORDER.indexOf(pilotId);
      p2PilotId = PILOT_ORDER[(i + 1) % PILOT_ORDER.length];
    }
    ensureAudio();
    renderPilots();
    try { sfx.pickup(); } catch {}
  }
  function unjoinP2Menu() {
    if (!p2Joined) return;
    p2Joined = false;
    menuP2Ready = false;
    renderPilots();
    try { sfx.hit(); } catch {}
  }
  function maybeLaunchCoop() {
    if (menuP1Ready && menuP2Ready) startGame();
  }

  // Mid-game drop-in: pad 1 presses START during a solo run. P2 spawns with
  // the default pilot (first one P1 isn't flying), fresh lives and a brief
  // invulnerability window.
  function joinP2MidGame() {
    if (players.length !== 1) return;
    p2Joined = true;
    let pid = PILOT_ORDER[0];
    for (const id of PILOT_ORDER) if (id !== players[0].pilotId) { pid = id; break; }
    p2PilotId = pid;
    const p = freshPlayer(1, pid);
    p.x = VW / 2 + 80;
    p.invuln = 150;
    players.push(p);
    floatingTexts.push({
      x: VW / 2, y: VH / 2 - 40, vy: -0.4, time: 100,
      text: 'P2 JOINS!', color: '#35e0ff', size: 28,
    });
    try { sfx.pickup(); } catch {}
  }

  if (AC) {
    AC.on('press', (e) => {
      const b = e.button;
      const pi = e.padIndex;
      // Reserved for the console shell: PS/home button, and SELECT+START quit
      // combo (we simply never bind select).
      if (b === 'home' || b === 'select') return;
      // Pause overlay: south/start resume, east quits to title — either pad
      if (state === PAUSED) {
        if (b === 'south' || b === 'start') togglePause();
        else if (b === 'east') backToTitleFromPause();
        return;
      }
      // Game-over / victory overlay open — any pad: south/start retries,
      // east changes pilot
      if (!endOverlay.classList.contains('hidden')) {
        if (b === 'south' || b === 'start') startGame();
        else if (b === 'east') backToTitleFromEnd();
        return;
      }
      // Title / pilot select
      if (state === MENU) {
        if (pi === 0) {
          if (!menuP1Ready) {
            if (b === 'left' || b === 'up')         selectPilotByOffset(-1, 0);
            else if (b === 'right' || b === 'down') selectPilotByOffset(+1, 0);
          }
          if (b === 'south' || b === 'start') {
            if (!p2Joined) { startGame(); return; }   // solo — launch straight away
            menuP1Ready = true;
            renderPilots();
            maybeLaunchCoop();
          } else if (b === 'east' && menuP1Ready) {
            menuP1Ready = false;
            renderPilots();
          }
        } else if (pi === 1) {
          if (!p2Joined) {
            if (b === 'south' || b === 'east' || b === 'west' || b === 'north') joinP2Menu();
            return;
          }
          if (!menuP2Ready) {
            if (b === 'left' || b === 'up')         selectPilotByOffset(-1, 1);
            else if (b === 'right' || b === 'down') selectPilotByOffset(+1, 1);
          }
          if (b === 'south' || b === 'start') {
            menuP2Ready = true;
            renderPilots();
            maybeLaunchCoop();
          } else if (b === 'east') {
            unjoinP2Menu();   // un-join any time before launch
          }
        }
        return;
      }
      // In match — start pauses (either pad); west / shoulder triggers that
      // player's own bomb. Pad 1 START while P2 isn't in the game = drop-in.
      if (state === PLAYING || state === WAVE_BANNER || state === BOSS) {
        if (pi === 1 && players.length === 1) {
          if (b === 'start' && (state === PLAYING || state === WAVE_BANNER)) joinP2MidGame();
          return;   // un-joined pad 1 owns nothing else mid-game
        }
        if (b === 'start') { togglePause(); return; }
        if (b === 'west' || b === 'r1' || b === 'l1') {
          if (state === PLAYING || state === WAVE_BANNER) {
            ensureAudio();
            detonateBomb(players[pi]);
          }
        }
      }
    });
  }

  // Held-state pad poll used by updatePlayers. Strict per-slot: P1 reads
  // pad(0), P2 reads pad(1). Respects the analog stick deadzone.
  function padHeldFor(i, name) {
    if (!PADS) return false;
    const p = PADS[i];
    if (!p || !p.connected) return false;
    if (p.button(name)) return true;
    if (name === 'left')  return p.axis('lx') < -0.35;
    if (name === 'right') return p.axis('lx') >  0.35;
    if (name === 'up')    return p.axis('ly') < -0.35;
    if (name === 'down')  return p.axis('ly') >  0.35;
    return false;
  }

  // Title screen per-frame poll — analog stick walks each player's pilot
  // cursor, the P2 join hint tracks pad 1 presence, and a joined P2 whose
  // pad disconnects is dropped back out.
  let _menuStickCool0 = 0, _menuStickCool1 = 0;
  function pollMenuGamepad() {
    if (!AC) return;
    if (state !== MENU) {
      _menuStickCool0 = 0; _menuStickCool1 = 0;
      if (_joinHintShown) { _joinHintShown = false; joinHintEl.style.display = 'none'; }
      return;
    }
    const pad1Here = PADS[1].connected;
    if (p2Joined && !pad1Here) unjoinP2Menu();
    // "P2 PRESS ✕ TO JOIN" — shown while a second pad sits idle
    const showHint = !p2Joined && pad1Here;
    if (showHint !== _joinHintShown) {
      _joinHintShown = showHint;
      joinHintEl.style.display = showHint ? '' : 'none';
    }
    // P1 stick
    if (_menuStickCool0 > 0) _menuStickCool0--;
    if (_menuStickCool0 === 0 && PADS[0].connected && !menuP1Ready) {
      const lx = PADS[0].axis('lx') || 0;
      if (lx < -0.5)      { selectPilotByOffset(-1, 0); _menuStickCool0 = 14; }
      else if (lx > 0.5)  { selectPilotByOffset(+1, 0); _menuStickCool0 = 14; }
    }
    // P2 stick (only while joined and not yet confirmed)
    if (_menuStickCool1 > 0) _menuStickCool1--;
    if (_menuStickCool1 === 0 && p2Joined && !menuP2Ready && pad1Here) {
      const lx = PADS[1].axis('lx') || 0;
      if (lx < -0.5)      { selectPilotByOffset(-1, 1); _menuStickCool1 = 14; }
      else if (lx > 0.5)  { selectPilotByOffset(+1, 1); _menuStickCool1 = 14; }
    }
  }

  // ───── update ─────
  function updatePlayers() {
    let slow = false;
    for (let pi = 0; pi < players.length; pi++) {
      const p = players[pi];
      if (!p.alive) {
        // Respawn countdown while teammates keep the run alive
        if (p.lives > 0 && p.respawnT > 0) {
          p.respawnT--;
          if (p.respawnT <= 0) {
            p.alive = true;
            p.x = homeX(p);
            p.y = VH - 60;
            p.vx = 0; p.vy = 0;
            p.invuln = 150;   // 2.5 s invulnerability blink
          }
        }
        continue;
      }
      updateOnePlayer(p);
      if (p.slowTime > 0) slow = true;
    }
    // Slow-mo affects enemies, not the players — either pilot's pickup counts.
    enemySpeed = slow ? 0.35 : 1;
  }

  function updateOnePlayer(p) {
    const SPEED = 4.6;
    const ACCEL = 0.7;
    const FRICTION = 0.82;
    const isP1 = p.idx === 0;
    let tx = 0, ty = 0;

    if (isP1 && touchTarget) {
      // glide toward drag target (canvas drag) — touch is P1-only
      const dx = touchTarget.x - p.x;
      const dy = touchTarget.y - p.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 2) {
        const k = Math.min(1, dist / 60);
        tx = (dx / dist) * SPEED * k;
        ty = (dy / dist) * SPEED * k;
      }
      p.vx = tx; p.vy = ty;
    } else {
      // P1: keyboard + touch D-pad + pad(0). P2: pad(1) only.
      const left  = isP1 ? (keys['arrowleft']  || keys['a'] || touchInput.left  || padHeldFor(0, 'left'))  : padHeldFor(1, 'left');
      const right = isP1 ? (keys['arrowright'] || keys['d'] || touchInput.right || padHeldFor(0, 'right')) : padHeldFor(1, 'right');
      const up    = isP1 ? (keys['arrowup']    || keys['w'] || touchInput.up    || padHeldFor(0, 'up'))    : padHeldFor(1, 'up');
      const down  = isP1 ? (keys['arrowdown']  || keys['s'] || touchInput.down  || padHeldFor(0, 'down'))  : padHeldFor(1, 'down');
      if (left)  p.vx -= ACCEL;
      if (right) p.vx += ACCEL;
      if (up)    p.vy -= ACCEL;
      if (down)  p.vy += ACCEL;
      p.vx = Math.max(-SPEED, Math.min(SPEED, p.vx));
      p.vy = Math.max(-SPEED, Math.min(SPEED, p.vy));
      if (!left && !right) p.vx *= FRICTION;
      if (!up   && !down)  p.vy *= FRICTION;
    }

    p.x += p.vx;
    p.y += p.vy;
    p.x = Math.max(20, Math.min(VW - 20, p.x));
    p.y = Math.max(40, Math.min(VH - 30, p.y));

    if (p.cooldown > 0) p.cooldown--;
    if (p.shieldTime > 0)  p.shieldTime--;
    if (p.homingTime > 0)  p.homingTime--;
    if (p.magnetTime > 0)  p.magnetTime--;
    if (p.slowTime > 0)    p.slowTime--;
    if (p.wingmenTime > 0) {
      p.wingmenTime--;
      if (p.wingmenTime === 0) p.wingmen.length = 0;
    }
    if (p.invuln > 0) p.invuln--;
    if (p.flash > 0) p.flash--;
    p.thruster = (p.thruster + 1) % 6;

    // Update wingmen cooldowns (they follow the ship when drawn)
    for (const w of p.wingmen) {
      if (w.cooldown > 0) w.cooldown--;
    }

    // Manual fire — hold or mash. VULCAN fires bolts through playerFire();
    // the BEAM is a held continuous weapon driven by updateBeam().
    // Gamepad: south (X/A) fires; r2 trigger also fires for a comfy hold.
    const fireHeld = isP1
      ? (keys[' '] || keys['spacebar'] || touchInput.fire || padHeldFor(0, 'south') || padHeldFor(0, 'r2'))
      : (padHeldFor(1, 'south') || padHeldFor(1, 'r2'));
    p.beamOn = !!(fireHeld && p.weapon === 'beam');
    if (!p.beamOn) p.beamHeat = 0;
    if (fireHeld) playerFire(p);
  }

  // Nearest living player to a point — enemy aim / steering helper.
  function nearestLivingPlayerTo(x, y) {
    let best = null, bestD = Infinity;
    for (let i = 0; i < players.length; i++) {
      const p = players[i];
      if (!p.alive) continue;
      const dx = p.x - x, dy = p.y - y;
      const d = dx * dx + dy * dy;
      if (d < bestD) { bestD = d; best = p; }
    }
    return best;
  }

  function nearestTargetTo(x, y) {
    let best = null, bestD = Infinity;
    function consider(t) {
      const dx = t.x - x, dy = t.y - y;
      const d = dx * dx + dy * dy;
      if (d < bestD) { bestD = d; best = t; }
    }
    for (const m of meteors)  consider(m);
    for (const u of ufos)     consider(u);
    for (const k of kamikazes) consider(k);
    for (const f of fighters) if (f.t >= 0) consider(f);
    for (const t of turrets)  if (t.phase !== 'falling') consider(t);
    if (miniBoss && miniBoss.phase !== 'dying') consider(miniBoss);
    if (zorg && zorg.phase !== 'dying')         consider(zorg);
    return best;
  }

  function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      // Homing bullets steer toward the nearest target, capped speed
      if (b.homing) {
        const t = nearestTargetTo(b.x, b.y);
        if (t) {
          const dx = t.x - b.x, dy = t.y - b.y;
          const d = Math.max(1, Math.hypot(dx, dy));
          const turn = 0.35;
          b.vx += (dx / d) * turn;
          b.vy += (dy / d) * turn;
          const sp = Math.hypot(b.vx, b.vy);
          const max = 11;
          if (sp > max) { b.vx = b.vx / sp * max; b.vy = b.vy / sp * max; }
        }
      }
      b.x += b.vx; b.y += b.vy;
      b.life--;
      if (b.life <= 0 || b.y < -20 || b.y > VH + 20 || b.x < -20 || b.x > VW + 20) bullets.splice(i, 1);
    }
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      b.x += b.vx * enemySpeed; b.y += b.vy * enemySpeed;
      b.life--;
      if (b.life <= 0 || b.y > VH + 20 || b.y < -20 || b.x < -20 || b.x > VW + 20) enemyBullets.splice(i, 1);
    }
  }

  function updateMeteors() {
    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      m.x += m.vx * enemySpeed;
      m.y += m.vy * enemySpeed;
      m.spin += m.spinV * enemySpeed;
      if (m.hitFlash > 0) m.hitFlash--;
      if (m.y > VH + 60) { meteors.splice(i, 1); continue; }
      // collide with players
      for (let pi = 0; pi < players.length; pi++) {
        const pl = players[pi];
        if (!pl.alive || pl.invuln > 0) continue;
        if (!circHit(pl, m)) continue;
        if (pl.shieldTime > 0) {
          // shield blocks — pop the meteor and a small explosion
          boom(m.x, m.y, m.r * 1.6, '#7fdcff');
          spawnDebris(m.x, m.y, '#7fdcff', 10);
          shake = Math.max(shake, 6);
          sfx.smallBoom();
        } else {
          boom(m.x, m.y, m.r * 1.8, '#ffa050');
          killPlayer(pl);
        }
        meteors.splice(i, 1);
        break;
      }
    }
  }

  // When a splitter rock dies it spawns three fast small fragments — fun
  // chain-reaction kills for kids and a great combo feeder.
  function splitMeteor(m) {
    for (let k = -1; k <= 1; k++) {
      spawnMeteor({
        x: m.x, y: m.y, vx: k * 2 + (Math.random() - 0.5),
        vy: 2.2 + Math.random() * 0.8,
        fragment: true,
      });
    }
  }

  function updateUFOs() {
    for (let i = ufos.length - 1; i >= 0; i--) {
      const u = ufos[i];
      u.x += u.vx * enemySpeed;
      u.y += Math.sin(u.x * 0.02) * 0.6 * enemySpeed;
      if (u.hitFlash > 0) u.hitFlash--;
      u.shootCooldown -= enemySpeed;
      if (u.shootCooldown <= 0) {
        u.shootCooldown = 90 + Math.random() * 40;
        // aim a slow bolt at the nearest living player
        const tgt = nearestLivingPlayerTo(u.x, u.y);
        if (tgt) {
          const dx = tgt.x - u.x, dy = tgt.y - u.y;
          const d = Math.max(1, Math.hypot(dx, dy));
          enemyBullets.push({ x: u.x, y: u.y + 6, vx: dx / d * 3.6, vy: dy / d * 3.6, r: 5, life: 220 });
          sfx.hit();
        }
      }
      if (u.x < -40 || u.x > VW + 40) { ufos.splice(i, 1); continue; }
      for (let pi = 0; pi < players.length; pi++) {
        const pl = players[pi];
        if (!pl.alive || pl.invuln > 0) continue;
        if (!circHit(pl, u)) continue;
        if (pl.shieldTime > 0) {
          boom(u.x, u.y, 40, '#aaff60');
          spawnDebris(u.x, u.y, '#aaff60', 12);
          sfx.smallBoom();
        } else {
          boom(u.x, u.y, 45, '#aaff60');
          killPlayer(pl);
        }
        ufos.splice(i, 1);
        break;
      }
    }
  }

  // ── formation fighters ── path-driven; whole-formation kills drop a
  //    weapon crate (the classic Raiden medal moment, feeds the combo too).
  function updateFighters() {
    for (let i = fighters.length - 1; i >= 0; i--) {
      const f = fighters[i];
      f.t += enemySpeed;
      if (f.hitFlash > 0) f.hitFlash--;
      f.thr = (f.thr + 1) & 3;
      fighterPos(f, f.t);
      f.x = _fp.x; f.y = _fp.y;
      if (f.t < 0) continue;
      // escaped off-screen after having entered play
      if (f.t > 60 && (f.y > VH + 40 || f.x < -60 || f.x > VW + 60)) {
        f.form.escaped++;
        fighters.splice(i, 1);
        continue;
      }
      // wave 5+: an occasional single aimed shot while crossing mid-screen
      if (!f.shot && wave >= 5 && f.y > 120 && f.y < 260 && Math.random() < 0.012) {
        f.shot = true;
        const tgt = nearestLivingPlayerTo(f.x, f.y);
        if (tgt) {
          const dx = tgt.x - f.x, dy = tgt.y - f.y;
          const d = Math.max(1, Math.hypot(dx, dy));
          enemyBullets.push({ x: f.x, y: f.y + 8, vx: dx / d * 3.2, vy: dy / d * 3.2, r: 5, life: 200, color: '#ff9a3c' });
          sfx.hit();
        }
      }
      // ramming the players
      for (let pi = 0; pi < players.length; pi++) {
        const pl = players[pi];
        if (!pl.alive || pl.invuln > 0) continue;
        if (!circHit(pl, f)) continue;
        if (pl.shieldTime > 0) {
          boom(f.x, f.y, 26, '#ff9944');
          spawnDebris(f.x, f.y, '#9aacc4', 6);
          sfx.smallBoom();
        } else {
          boom(f.x, f.y, 30, '#ff9944');
          killPlayer(pl);
        }
        f.form.escaped++;   // a ram is not a clean formation kill
        fighters.splice(i, 1);
        break;
      }
    }
    // formation resolution — medal drop only for a full clean sweep
    for (let i = formations.length - 1; i >= 0; i--) {
      const fm = formations[i];
      if (fm.killed + fm.escaped < fm.total) continue;
      if (fm.escaped === 0 && !fm.bombed && fm.killed > 0) {
        addPoints(300, fm.dropX, fm.dropY, 'FORMATION! +300');
        spawnPowerup(fm.dropX, Math.min(fm.dropY, VH - 120), Math.random() < 0.55 ? 'vulcan' : 'beam');
        sfx.waveStart();
      }
      formations.splice(i, 1);
    }
  }

  function killFighter(f, idx) {
    boom(f.x, f.y, 26, '#ff9944');
    spawnDebris(f.x, f.y, '#9aacc4', 6);
    addPoints(60, f.x, f.y, '+60');
    f.form.killed++;
    f.form.dropX = f.x; f.form.dropY = f.y;
    fighters.splice(idx, 1);
    sfx.smallBoom();
  }

  // ── Kamikaze drones ── arrive in pods of 3-5 from the top, lock onto the
  // player, dive. No projectiles — they're a ramming threat. Cheap and weak,
  // but their swarm makes the screen feel alive.
  function updateKamikazes() {
    for (let i = kamikazes.length - 1; i >= 0; i--) {
      const k = kamikazes[i];
      const tgt = nearestLivingPlayerTo(k.x, k.y);
      if (tgt) {
        const dx = tgt.x - k.x;
        k.vx += Math.sign(dx) * 0.06;
        k.vx = Math.max(-2.4, Math.min(2.4, k.vx));
      }
      k.x += k.vx * enemySpeed;
      k.y += k.vy * enemySpeed;
      k.thruster = (k.thruster + 1) % 4;
      if (k.y > VH + 40) { kamikazes.splice(i, 1); continue; }
      for (let pi = 0; pi < players.length; pi++) {
        const pl = players[pi];
        if (!pl.alive || pl.invuln > 0) continue;
        if (!circHit(pl, k)) continue;
        if (pl.shieldTime > 0) {
          boom(k.x, k.y, 28, '#c45fff');
          spawnDebris(k.x, k.y, '#c45fff', 8);
          sfx.smallBoom();
        } else {
          boom(k.x, k.y, 32, '#c45fff');
          killPlayer(pl);
        }
        kamikazes.splice(i, 1);
        break;
      }
    }
  }

  // ── Turret asteroids ── fall in, lock at an altitude, fire aimed bolts.
  // Slow but tanky (4 HP) — players must prioritise them or eat damage.
  function updateTurrets() {
    for (let i = turrets.length - 1; i >= 0; i--) {
      const t = turrets[i];
      t.spin += 0.02 * enemySpeed;
      if (t.hitFlash > 0) t.hitFlash--;
      if (t.phase === 'falling') {
        t.y += t.vy * enemySpeed;
        if (t.y >= t.dockY) { t.phase = 'docked'; t.vy = 0; sfx.warn(); }
      } else {
        t.cooldown -= enemySpeed;
        if (t.cooldown <= 0) {
          t.cooldown = 95 + Math.random() * 30;
          const tgt = nearestLivingPlayerTo(t.x, t.y);
          if (tgt) {
            const dx = tgt.x - t.x, dy = tgt.y - t.y;
            const d = Math.max(1, Math.hypot(dx, dy));
            enemyBullets.push({ x: t.x, y: t.y + 6, vx: dx / d * 4.2, vy: dy / d * 4.2, r: 5.5, life: 200, color: '#ff7a30' });
            sfx.hit();
          }
        }
      }
      for (let pi = 0; pi < players.length; pi++) {
        const pl = players[pi];
        if (!pl.alive || pl.invuln > 0) continue;
        if (!circHit(pl, t)) continue;
        if (pl.shieldTime > 0) {
          boom(t.x, t.y, 40, '#ff7a30');
          spawnDebris(t.x, t.y, '#ff7a30', 10);
          sfx.smallBoom();
        } else {
          boom(t.x, t.y, 50, '#ff7a30');
          killPlayer(pl);
        }
        turrets.splice(i, 1);
        break;
      }
    }
  }

  // ── Mothership mini-boss (wave 4) ── glides into position, hovers across
  // the top, periodically drops kamikaze pods + fires aimed twin bolts.
  // Takes a chunk of HP; clearing it unlocks the harder back half of the
  // run. Re-uses drawZorg-style hull but flatter and red.
  function updateMothership() {
    if (!miniBoss) return;
    const m = miniBoss;
    m.moveT++;
    if (m.flash > 0) m.flash--;
    if (m.phase === 'entering') {
      m.y += (m.ty - m.y) * 0.04;
      if (Math.abs(m.ty - m.y) < 1.5) m.phase = 'fight';
      return;
    }
    if (m.phase === 'dying') {
      m.deathT = (m.deathT || 0) + 1;
      if (m.deathT % 8 === 0) {
        boom(m.x + (Math.random() - 0.5) * 100, m.y + (Math.random() - 0.5) * 30,
             36 + Math.random() * 18, '#ff5252');
        sfx.smallBoom();
        shake = Math.max(shake, 8);
      }
      if (m.deathT > 60) {
        boom(m.x, m.y, 120, '#fff');
        spawnDebris(m.x, m.y, '#ff5252', 36);
        sfx.boom();
        shake = Math.max(shake, 16);
        addPoints(800, m.x, m.y, '+800');
        floatingTexts.push({ x: VW / 2, y: VH / 2, vy: -0.4, time: 90, text: 'MOTHERSHIP DOWN!', color: '#ffe066', size: 28 });
        // Boss-clear loot drop — three crates so kids feel rewarded
        spawnPowerup(m.x - 40, m.y, 'bomb');
        spawnPowerup(m.x,      m.y, 'shield');
        spawnPowerup(m.x + 40, m.y, 'life');
        try {
          if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance('Mothership down!');
            u.pitch = 1.1; u.rate = 1.0; u.volume = 0.9;
            window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
          }
        } catch {}
        miniBoss = null;
        // proceed to next wave
        startWave(wave + 1);
      }
      return;
    }
    // hover sweep across the top — slower than before so kids can read it
    m.x += m.moveX * 1.0 * enemySpeed;
    if (m.x < 80)  { m.x = 80;  m.moveX = 1; }
    if (m.x > VW - 80) { m.x = VW - 80; m.moveX = -1; }
    m.y = m.ty + Math.sin(m.moveT * 0.04) * 14;

    m.shootCooldown -= enemySpeed;
    if (m.shootCooldown <= 0) {
      m.shootCooldown = 130 + Math.random() * 40;
      const tgt = nearestLivingPlayerTo(m.x, m.y);
      if (tgt) {
        const dx = tgt.x - m.x, dy = tgt.y - m.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        const bx = dx / d, by = dy / d;
        // twin bolt — slower so it's dodgeable
        for (const off of [-12, 12]) {
          enemyBullets.push({ x: m.x + off, y: m.y + 14, vx: bx * 3.0, vy: by * 3.0, r: 5, life: 220, color: '#ff5252' });
        }
        sfx.hit();
      }
    }
    m.dropCooldown -= enemySpeed;
    if (m.dropCooldown <= 0) {
      m.dropCooldown = 320 + Math.random() * 100;
      // pod of 2 (was 3) and they start slower
      for (let k = 0; k < 2; k++) {
        spawnKamikaze({ x: m.x + (k - 0.5) * 30, y: m.y + 14, vx: (k - 0.5) * 0.5, vy: 1.4 + Math.random() * 0.5 });
      }
      sfx.warn();
    }
    // Half-HP care package — shield + bomb fall to help you finish.
    if (!m.halfHpDrop && m.hp <= m.maxHp / 2) {
      m.halfHpDrop = true;
      spawnPowerup(m.x - 22, m.y + 24, 'shield');
      spawnPowerup(m.x + 22, m.y + 24, 'bomb');
    }

    for (let pi = 0; pi < players.length; pi++) {
      const pl = players[pi];
      if (!pl.alive || pl.invuln > 0) continue;
      if (!circHit(pl, m)) continue;
      if (pl.shieldTime > 0) {
        pl.y = Math.min(VH - 30, pl.y + 50);
        sfx.smallBoom();
      } else killPlayer(pl);
    }
  }

  // ── BEAM weapon ── the blue Raiden laser: a held continuous vertical
  // column from the ship's nose to the top of the screen. Damage ticks on a
  // cadence; level raises width, damage and tick rate (levels 1-4).
  function beamHalfW(lv) { return 5 + lv * 3; }   // 8 / 11 / 14 / 17
  function updateBeam() {
    for (let pi = 0; pi < players.length; pi++) {
      const p = players[pi];
      if (!p.alive || !p.beamOn) continue;
      p.beamHeat++;
      // beam hum — quiet cadence so it doesn't drown the mix
      if (p.beamHeat % 9 === 1) blip(90 + p.wlevel * 25, 0.10, 'sawtooth', 0.035, 60);
      // M missiles stack on the beam: lob a homing pair on a slow cadence
      if (p.homingTime > 0 && p.beamHeat % 16 === 0) {
        bullets.push({ x: p.x - 12, y: p.y - 6, vx: -2, vy: -7, r: 4, color: '#5dd66c', life: 90, homing: true });
        bullets.push({ x: p.x + 12, y: p.y - 6, vx: 2, vy: -7, r: 4, color: '#5dd66c', life: 90, homing: true });
      }
      const tickEvery = p.wlevel >= 4 ? 3 : 4;
      if ((p.beamHeat % tickEvery) !== 0) continue;
      const dmg = p.wlevel >= 3 ? 2 : 1;
      const colX = p.x;
      const halfW = beamHalfW(p.wlevel);
      for (let i = meteors.length - 1; i >= 0; i--) {
        const m = meteors[i];
        if (m.y < p.y && Math.abs(m.x - colX) < halfW + (m.r || 0)) {
          m.hp -= dmg;
          m.hitFlash = 2;
          spawnDebris(m.x, m.y, m.kind === 'ice' ? '#aae6ff' : '#ff8040', 2);
          if (m.hp <= 0) {
            boom(m.x, m.y, m.r * 1.5, m.kind === 'ice' ? '#aae6ff' : '#ffa050');
            spawnDebris(m.x, m.y, m.kind === 'ice' ? '#aae6ff' : '#ff8040', m.big ? 14 : 6);
            const pts = m.big ? 30 : (m.kind === 'ice' ? 20 : 10);
            addPoints(pts, m.x, m.y);
            if (m.splitter) splitMeteor(m);
            if (Math.random() < (m.big ? 0.60 : 0.18)) spawnPowerup(m.x, m.y);
            const wasFragment = m.fragment;
            meteors.splice(i, 1);
            if (state === PLAYING && !wasFragment) meteorsRemaining = Math.max(0, meteorsRemaining - 1);
          }
        }
      }
      for (let i = ufos.length - 1; i >= 0; i--) {
        const u = ufos[i];
        if (u.y < p.y && Math.abs(u.x - colX) < halfW + (u.r || 0)) {
          u.hp -= dmg;
          u.hitFlash = 2;
          if (u.hp <= 0) {
            boom(u.x, u.y, 36, '#aaff60');
            spawnDebris(u.x, u.y, '#aaff60', 10);
            addPoints(80, u.x, u.y, '+80');
            if (Math.random() < 0.55) spawnPowerup(u.x, u.y);
            ufos.splice(i, 1);
          }
        }
      }
      for (let i = kamikazes.length - 1; i >= 0; i--) {
        const k = kamikazes[i];
        if (k.y < p.y && Math.abs(k.x - colX) < halfW + (k.r || 0)) {
          boom(k.x, k.y, 22, '#c45fff');
          spawnDebris(k.x, k.y, '#c45fff', 6);
          addPoints(40, k.x, k.y, '+40');
          if (Math.random() < 0.18) spawnPowerup(k.x, k.y);
          kamikazes.splice(i, 1);
        }
      }
      for (let i = fighters.length - 1; i >= 0; i--) {
        const f = fighters[i];
        if (f.t >= 0 && f.y < p.y && Math.abs(f.x - colX) < halfW + (f.r || 0)) {
          killFighter(f, i);
        }
      }
      for (let i = turrets.length - 1; i >= 0; i--) {
        const t = turrets[i];
        if (t.y < p.y && Math.abs(t.x - colX) < halfW + (t.r || 0)) {
          t.hp -= dmg;
          t.hitFlash = 2;
          if (t.hp <= 0) {
            boom(t.x, t.y, 40, '#ff7a30');
            spawnDebris(t.x, t.y, '#ff7a30', 14);
            addPoints(120, t.x, t.y, '+120');
            if (Math.random() < 0.60) spawnPowerup(t.x, t.y);
            turrets.splice(i, 1);
          }
        }
      }
      if (miniBoss && miniBoss.phase === 'fight' && Math.abs(miniBoss.x - colX) < halfW + miniBoss.r) {
        miniBoss.hp = Math.max(0, miniBoss.hp - dmg);
        miniBoss.flash = 4;
        if (miniBoss.hp <= 0) startMiniBossDeath();
      }
      if (zorg && zorg.phase === 'fight' && Math.abs(zorg.x - colX) < halfW + zorg.r) {
        zorg.hp = Math.max(0, zorg.hp - dmg);
        zorg.flash = 4;
        if (zorg.hp <= 0) startZorgDeath();
      }
    }
  }

  function startMiniBossDeath() {
    miniBoss.phase = 'dying';
    miniBoss.deathT = 0;
  }

  function updatePowerups() {
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      // MAGNET: accelerate toward the nearest living player with magnet active.
      let mag = null, magD = Infinity;
      for (let pi = 0; pi < players.length; pi++) {
        const pl = players[pi];
        if (!pl.alive || pl.magnetTime <= 0) continue;
        const dx = pl.x - p.x, dy = pl.y - p.y;
        const d = dx * dx + dy * dy;
        if (d < magD) { magD = d; mag = pl; }
      }
      if (mag) {
        const dx = mag.x - p.x, dy = mag.y - p.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        p.vx += (dx / d) * 0.35;
        p.vy += (dy / d) * 0.35;
        p.vx = Math.max(-6, Math.min(6, p.vx));
        p.vy = Math.max(-2, Math.min(6, p.vy));
      } else {
        p.vx *= 0.96;
        if (p.vy < 1.2) p.vy = Math.min(1.2, p.vy + 0.04);
      }
      p.x += p.vx;
      p.y += p.vy;
      p.rotation += 0.04;
      if (p.y > VH + 40 || p.x < -40 || p.x > VW + 40) { powerups.splice(i, 1); continue; }
      // Collected by whoever touches it first
      for (let pi = 0; pi < players.length; pi++) {
        const pl = players[pi];
        if (!pl.alive) continue;
        if (circHit(pl, p)) {
          applyPowerup(p.kind, pl);
          powerups.splice(i, 1);
          break;
        }
      }
    }
  }

  // ── Background events ── distant comets streaking behind the play field.
  // Pure scenery; never collide with anything. Adds liveliness to slow moments.
  function updateBgComets() {
    if (Math.random() < 0.0035 && bgComets.length < 2) {
      bgComets.push({
        x: -60, y: 30 + Math.random() * 220,
        vx: 3 + Math.random() * 2.5, vy: 0.4 + Math.random() * 0.6,
        len: 60 + Math.random() * 60,
        spr: Math.random() < 0.5 ? SPR.comet0 : SPR.comet1,
      });
    }
    for (let i = bgComets.length - 1; i >= 0; i--) {
      const c = bgComets[i];
      c.x += c.vx; c.y += c.vy;
      if (c.x > VW + 120) bgComets.splice(i, 1);
    }
  }

  // ── Combo tick ── decay the combo when no kills have happened recently
  function updateCombo() {
    if (comboTimer > 0) {
      comboTimer--;
      if (comboTimer <= 0) resetCombo();
    }
  }

  // ── Meteor shower set-piece ── triggers occasionally during a wave,
  // shows a banner, then rains meteors at 4-5x normal rate for 5 seconds.
  function maybeTriggerShower() {
    if (state !== PLAYING) return;
    if (meteorShowerT > 0) return;
    const def = WAVES[wave - 1];
    if (!def || !def.showerChance) return;
    if (Math.random() < def.showerChance) {
      meteorShowerT = 300;
      floatingTexts.push({ x: VW / 2, y: 90, vy: -0.4, time: 100, text: 'METEOR SHOWER!', color: '#ff5252', size: 28 });
      shake = Math.max(shake, 6);
      sfx.warn();
    }
  }
  function updateMeteorShower() {
    if (meteorShowerT <= 0) return;
    meteorShowerT--;
    if (meteorShowerT % 10 === 0) spawnMeteor();
  }

  function applyPowerup(kind, p) {
    sfx.pickup();
    let label = '', color = '#ffe066';
    if (kind === 'vulcan' || kind === 'beam') {
      // Raiden red/blue: same colour levels up (max 4 → score bonus),
      // the other colour switches weapon but keeps your level.
      const wname = kind === 'vulcan' ? 'VULCAN' : 'LASER';
      color = kind === 'vulcan' ? '#ff5252' : '#35a0ff';
      if (p.weapon === kind) {
        if (p.wlevel < 4) { p.wlevel++; label = wname + ' LV' + p.wlevel; }
        else { addPoints(300, p.x, p.y - 46, 'MAX POWER +300'); label = wname + ' MAX'; }
      } else {
        p.weapon = kind;
        p.beamHeat = 0;
        label = wname + ' LV' + p.wlevel;
      }
    }
    else if (kind === 'shield')  { p.shieldTime = 600; sfx.shield(); label = 'SHIELD'; color = '#7fdcff'; }
    else if (kind === 'bomb')    { p.bombs = Math.min(9, p.bombs + 1); syncBombBtn(); label = '+ BOMB'; color = '#ffb24d'; }
    else if (kind === 'life')    { p.lives = Math.min(5, p.lives + 1); label = '+ LIFE'; color = '#ff80b3'; }
    else if (kind === 'magnet')  { p.magnetTime = Math.max(p.magnetTime, 900); label = 'MAGNET'; color = '#c45fff'; }
    else if (kind === 'homing')  { p.homingTime = Math.max(p.homingTime, 700); label = 'MISSILES'; color = '#5dd66c'; }
    else if (kind === 'slowmo')  { p.slowTime   = Math.max(p.slowTime, 360);   label = 'SLOW-MO'; color = '#aae6ff'; }
    else if (kind === 'wingmen') { spawnWingmen(p); label = 'WINGMEN'; color = '#ffe066'; }
    floatingTexts.push({ x: p.x, y: p.y - 28, vy: -0.8, time: 70, text: label, color, size: 18 });
    speakVoice(p.pilotId);
  }

  function spawnWingmen(p) {
    p.wingmenTime = 720;
    p.wingmen.length = 0;
    p.wingmen.push({ side: -1, offsetX: -34, offsetY: 6, cooldown: 0, hp: 1 });
    p.wingmen.push({ side:  1, offsetX:  34, offsetY: 6, cooldown: 8, hp: 1 });
  }

  // bullet ↔ enemy collisions
  function updateCollisions() {
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      let hit = false;
      for (let j = meteors.length - 1; j >= 0; j--) {
        const m = meteors[j];
        if (circHit(b, m)) {
          m.hp--;
          m.hitFlash = 2;
          sfx.hit();
          spawnDebris(b.x, b.y, m.kind === 'ice' ? '#aae6ff' : (m.kind === 'splitter' ? '#5dd66c' : '#ff8040'), 4);
          if (m.hp <= 0) {
            const popColor = m.kind === 'ice' ? '#aae6ff' : m.kind === 'splitter' ? '#5dd66c' : '#ffa050';
            boom(m.x, m.y, m.r * 1.8, popColor);
            spawnDebris(m.x, m.y, popColor, m.big ? 16 : 8);
            const pts = m.fragment ? 5 : (m.big ? 30 : (m.kind === 'ice' ? 20 : (m.kind === 'splitter' ? 15 : 10)));
            addPoints(pts, m.x, m.y);
            if (m.splitter) splitMeteor(m);
            if (!m.fragment && Math.random() < (m.big ? 0.60 : 0.18)) spawnPowerup(m.x, m.y);
            meteors.splice(j, 1);
            if (state === PLAYING && !m.fragment) meteorsRemaining--;
            sfx.smallBoom();
          }
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(i, 1); continue; }
      for (let j = ufos.length - 1; j >= 0; j--) {
        const u = ufos[j];
        if (circHit(b, u)) {
          u.hp--;
          u.hitFlash = 2;
          sfx.hit();
          if (u.hp <= 0) {
            boom(u.x, u.y, 40, '#aaff60');
            spawnDebris(u.x, u.y, '#aaff60', 12);
            addPoints(80, u.x, u.y, '+80');
            if (Math.random() < 0.55) spawnPowerup(u.x, u.y);
            ufos.splice(j, 1);
            sfx.smallBoom();
          }
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(i, 1); continue; }
      for (let j = kamikazes.length - 1; j >= 0; j--) {
        const k = kamikazes[j];
        if (circHit(b, k)) {
          boom(k.x, k.y, 28, '#c45fff');
          spawnDebris(k.x, k.y, '#c45fff', 8);
          addPoints(40, k.x, k.y, '+40');
          if (Math.random() < 0.18) spawnPowerup(k.x, k.y);
          kamikazes.splice(j, 1);
          sfx.smallBoom();
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(i, 1); continue; }
      // zippy formation fighters — 1 HP each; killFighter tracks the medal
      for (let j = fighters.length - 1; j >= 0; j--) {
        const f = fighters[j];
        if (f.t >= 0 && circHit(b, f)) {
          killFighter(f, j);
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(i, 1); continue; }
      for (let j = turrets.length - 1; j >= 0; j--) {
        const t = turrets[j];
        if (circHit(b, t)) {
          t.hp--;
          t.hitFlash = 2;
          sfx.hit();
          spawnDebris(b.x, b.y, '#ff7a30', 4);
          if (t.hp <= 0) {
            boom(t.x, t.y, 45, '#ff7a30');
            spawnDebris(t.x, t.y, '#ff7a30', 16);
            addPoints(120, t.x, t.y, '+120');
            if (Math.random() < 0.60) spawnPowerup(t.x, t.y);
            turrets.splice(j, 1);
            sfx.smallBoom();
            hitPauseT = Math.max(hitPauseT, 3);
          }
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(i, 1); continue; }
      if (miniBoss && miniBoss.phase === 'fight' && circHit(b, miniBoss)) {
        miniBoss.hp = Math.max(0, miniBoss.hp - 1);
        miniBoss.flash = 8;
        sfx.hit();
        spawnDebris(b.x, b.y, '#ff5252', 4);
        if (miniBoss.hp <= 0) startMiniBossDeath();
        bullets.splice(i, 1);
        continue;
      }
      if (zorg && zorg.phase !== 'dying' && circHit(b, zorg)) {
        zorg.hp = Math.max(0, zorg.hp - 1);
        zorg.flash = 8;
        sfx.hit();
        spawnDebris(b.x, b.y, '#aaff60', 4);
        if (zorg.hp <= 0) startZorgDeath();
        bullets.splice(i, 1);
      }
    }
    // enemy bullets hit players
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      for (let pi = 0; pi < players.length; pi++) {
        const pl = players[pi];
        if (!pl.alive || pl.invuln > 0) continue;
        if (!circHit(pl, b)) continue;
        if (pl.shieldTime > 0) {
          spawnDebris(b.x, b.y, '#7fdcff', 6);
          sfx.hit();
        } else {
          killPlayer(pl);
        }
        enemyBullets.splice(i, 1);
        break;
      }
    }
  }

  function circHit(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    const r = (a.r || 6) + (b.r || 6);
    return dx * dx + dy * dy < r * r;
  }

  function updateExplosionsParticlesText() {
    // pooled sprite-sheet explosions — small ones pop fast, medium/large
    // linger a touch longer (Raiden fireballs hang in the air)
    for (let i = 0; i < EXPLO_MAX; i++) {
      const e = explosions[i];
      if (!e.active) continue;
      e.tick++;
      if (e.tick >= (e.tier > 0 ? 3 : 2)) {
        e.tick = 0;
        e.f++;
        if (e.f >= EXPLO_FRAMES) e.active = false;
      }
    }
    // pooled debris particles
    for (let i = 0; i < PART_MAX; i++) {
      const p = particles[i];
      if (!p.active) continue;
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.05;
      p.vx *= 0.99;
      p.life--;
      if (p.life <= 0) p.active = false;
    }
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const ft = floatingTexts[i];
      ft.y += ft.vy;
      ft.time--;
      if (ft.time <= 0) floatingTexts.splice(i, 1);
    }
  }

  function updateWave() {
    if (state !== PLAYING) return;
    const def = WAVES[wave - 1];
    if (!def || def.boss) return;
    waveTimer++;
    if (meteorsRemaining > 0) {
      waveSpawnAcc++;
      if (waveSpawnAcc >= waveSpawnInterval) {
        waveSpawnAcc = 0;
        if (def.ufoEvery > 0 && Math.floor(waveTimer / waveSpawnInterval) % def.ufoEvery === def.ufoEvery - 1) {
          spawnUFO();
        } else {
          spawnMeteor();
        }
      }
      // Kamikaze swarms — every kamikazeEvery cycles, drop a pod of 3-5
      if (def.kamikazeEvery > 0) {
        kamikazeAcc++;
        if (kamikazeAcc >= def.kamikazeEvery * 18) {
          kamikazeAcc = 0;
          const count = 3 + Math.floor(Math.random() * 3);
          for (let k = 0; k < count; k++) {
            spawnKamikaze({ x: 80 + Math.random() * (VW - 160), y: -20 - k * 22, vx: (Math.random() - 0.5) * 1.2 });
          }
        }
      }
      // Turret asteroids (one at a time, slow trickle)
      if (def.turretEvery > 0) {
        turretAcc++;
        if (turretAcc >= def.turretEvery * 22 && turrets.length < 2) {
          turretAcc = 0;
          spawnTurret();
        }
      }
      // Choreographed fighter formations — one at a time so they read as a
      // set-piece, not extra bullet-hell density
      if (def.formEvery > 0) {
        formAcc++;
        if (formAcc >= def.formEvery * 18 && fighters.length === 0) {
          formAcc = 0;
          spawnFormation();
        }
      }
      // Random meteor-shower set piece
      maybeTriggerShower();
    }
    // wave complete when all spawn queues empty AND nothing on screen
    if (meteorsRemaining <= 0 && meteorShowerT <= 0 &&
        meteors.length === 0 && ufos.length === 0 &&
        kamikazes.length === 0 && turrets.length === 0 &&
        fighters.length === 0) {
      startWave(wave + 1);
    }
  }

  function updateZorg() {
    if (!zorg) return;
    zorg.moveT++;
    if (zorg.flash > 0) zorg.flash--;
    if (zorg.phase === 'entering') {
      zorg.y += (zorg.ty - zorg.y) * 0.04;
      if (Math.abs(zorg.ty - zorg.y) < 1.5) {
        zorg.phase = 'fight';
        try {
          if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance('You cannot defeat me!');
            u.pitch = 0.4; u.rate = 0.85; u.volume = 0.9;
            window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
          }
        } catch {}
      }
      return;
    }
    if (zorg.phase === 'dying') {
      zorg.deathT = (zorg.deathT || 0) + 1;
      if (zorg.deathT % 10 === 0) {
        boom(zorg.x + (Math.random() - 0.5) * 80, zorg.y + (Math.random() - 0.5) * 50,
             40 + Math.random() * 20, '#ffce4d');
        sfx.smallBoom();
        shake = Math.max(shake, 8);
      }
      if (zorg.deathT > 90) {
        boom(zorg.x, zorg.y, 140, '#fff');
        spawnDebris(zorg.x, zorg.y, '#aaff60', 50);
        sfx.boom();
        shake = Math.max(shake, 24);
        addPoints(2000, zorg.x, zorg.y, '+2000');
        zorg = null;
        winGame();
      }
      return;
    }

    // figure-8 hover
    const t = zorg.moveT * 0.012;
    zorg.x = VW / 2 + Math.sin(t) * 240;
    zorg.y = 110 + Math.sin(t * 2) * 35;

    // shooting pattern: 3-round burst aimed at the nearest living player
    zorg.shootCooldown--;
    if (zorg.shootCooldown <= 0) {
      zorg.shootCooldown = 60 + Math.random() * 30;
      const tgt = nearestLivingPlayerTo(zorg.x, zorg.y);
      if (tgt) {
        const dx = tgt.x - zorg.x, dy = tgt.y - zorg.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        const bx = dx / d, by = dy / d;
        for (let i = -1; i <= 1; i++) {
          const a = i * 0.18;
          const cs = Math.cos(a), sn = Math.sin(a);
          enemyBullets.push({
            x: zorg.x, y: zorg.y + 20,
            vx: (bx * cs - by * sn) * 4.4,
            vy: (bx * sn + by * cs) * 4.4,
            r: 5.5, life: 200, color: '#aaff60',
          });
        }
        sfx.bigShot();
      }
    }

    // occasionally drops a meteor
    zorg.meteorCooldown--;
    if (zorg.meteorCooldown <= 0) {
      zorg.meteorCooldown = 180 + Math.random() * 120;
      meteors.push({
        x: zorg.x + (Math.random() - 0.5) * 80,
        y: zorg.y + 30,
        vx: (Math.random() - 0.5) * 2,
        vy: 2.2 + Math.random(),
        r: 18 + Math.random() * 6,
        hp: 1, maxHp: 1,
        kind: 'rock',
        spin: 0, spinV: (Math.random() - 0.5) * 0.05,
        big: false,
        v: (Math.random() * 3) | 0,
        hitFlash: 0,
      });
      sfx.warn();
    }

    // body collision with the players
    for (let pi = 0; pi < players.length; pi++) {
      const pl = players[pi];
      if (!pl.alive || pl.invuln > 0) continue;
      if (!circHit(pl, zorg)) continue;
      if (pl.shieldTime > 0) {
        // bounce back
        pl.y = Math.min(VH - 30, pl.y + 40);
        spawnDebris(pl.x, pl.y, '#7fdcff', 6);
        sfx.smallBoom();
      } else {
        killPlayer(pl);
      }
    }
  }

  function startZorgDeath() {
    zorg.phase = 'dying';
    zorg.deathT = 0;
    hitPauseT = Math.max(hitPauseT, 8);
    try {
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance('Noooo!');
        u.pitch = 0.4; u.rate = 0.6; u.volume = 0.95;
        window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
      }
    } catch {}
  }

  // ───── render ─────
  // Everything below is drawImage of pre-baked sprites — the only per-frame
  // path/vector work left is text and a fixed handful of HUD fillRects.
  function applyCamera() {
    let ex = offX, ey = offY;
    if (shake > 0) {
      ex += (Math.random() - 0.5) * shake * 0.8;
      ey += (Math.random() - 0.5) * shake * 0.8;
    }
    _camX = ex; _camY = ey;
    ctx.setTransform(scale, 0, 0, scale, ex, ey);
  }

  function drawShip(p) {
    if (!p.alive) return;
    // post-respawn blink
    if (p.invuln > 0 && ((p.invuln >> 2) & 1) === 0) return;
    // banking frame from horizontal velocity (Raiden-style lean)
    const bank = p.vx < -1.3 ? 0 : p.vx > 1.3 ? 2 : 1;
    // thruster flame — two baked frames alternate for flicker
    drawSpr(p.thruster < 3 ? SPR.flame0 : SPR.flame1, p.x, p.y + 18);
    drawSpr(SPR['ship_' + p.pilotId + '_' + p.idx + '_' + bank], p.x, p.y);
    // muzzle flash baked as a sprite, popped over the nose while firing
    if (p.muzzle > 0) {
      p.muzzle--;
      drawSpr(muzzleSpr(p.boltColor), p.x, p.y - 22);
    }
    // shield bubble
    if (p.shieldTime > 0) {
      const a = 0.55 + Math.sin(Date.now() / 90) * 0.2;
      ctx.globalAlpha = p.shieldTime < 120 ? a * (0.35 + 0.65 * ((p.shieldTime >> 2) & 1)) : a;
      drawSprScaled(SPR.shield, p.x, p.y, 52, 52);
      ctx.globalAlpha = 1;
    }
    // P2 tag under the ship so the kids never lose track of who's who
    if (p.idx === 1) {
      ctx.font = '8px ' + HUD_FONT;
      ctx.textAlign = 'center';
      ctx.lineWidth = 3; ctx.lineJoin = 'round';
      ctx.strokeStyle = 'rgba(0,0,0,0.85)';
      ctx.strokeText('P2', p.x, p.y + 30);
      ctx.fillStyle = '#35e0ff';
      ctx.fillText('P2', p.x, p.y + 30);
    }
  }

  function drawBullet(b) {
    const s = boltSpr(b.color);
    if (b.homing || b.vx * b.vx > 0.8) {
      drawSprRot(s, b.x, b.y, Math.atan2(b.vy, b.vx) + Math.PI / 2);
    } else {
      ctx.drawImage(s.c, b.x - s.w / 2, b.y - s.h / 2, s.w, s.h);
    }
  }

  function drawEnemyBullet(b) {
    // bigger + brighter than the old vector dots — readable from the couch
    const s = shotSpr(b.color || '#ff5050');
    const d = b.r * 4.4;
    ctx.drawImage(s.c, b.x - d / 2, b.y - d / 2, d, d);
  }

  let _trailBudget = 8;
  function drawMeteor(m) {
    // trail sprite behind the velocity vector (medium+ rocks only, capped
    // per frame — keeps the busy-frame drawImage budget honest)
    if (!m.fragment && m.r >= 15 && _trailBudget > 0) {
      _trailBudget--;
      const ang = Math.atan2(m.vy, m.vx);
      const ts = SPR['trail_' + m.kind];
      const k = Math.max(0.5, m.r / MET_R);
      drawSprRot(ts, m.x - Math.cos(ang) * m.r * 1.25, m.y - Math.sin(ang) * m.r * 1.25, ang, k);
    }
    const key = 'met_' + m.kind + '_' + m.v;
    const s = m.hitFlash > 0 ? SPR[key + '_w'] : SPR[key];
    const sc = (m.r * 2.25) / 72;   // baked at R=30 in a 72px box
    drawSprRot(s, m.x, m.y, m.spin, sc);
    // damaged big rocks show baked cracks
    if (m.big && m.hp < m.maxHp) drawSprRot(SPR.metCrack, m.x, m.y, m.spin, sc);
  }

  function drawUFO(s) {
    const spr = s.hitFlash > 0
      ? (s.vx < 0 ? SPR.ufoL_w : SPR.ufoR_w)
      : (s.vx < 0 ? SPR.ufoL : SPR.ufoR);
    drawSpr(spr, s.x, s.y);
    if (s.hp < s.maxHp) {
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(s.x - 10, s.y - 16, 20, 2);
      ctx.fillStyle = '#5dd66c';
      ctx.fillRect(s.x - 10, s.y - 16, 20 * (s.hp / s.maxHp), 2);
    }
  }

  // Background streak — scenic comet far behind the action plane.
  function drawBgComet(c) {
    ctx.globalAlpha = 0.55;
    drawSprRot(c.spr, c.x - c.len * 0.4, c.y + c.len * 0.06, Math.atan2(c.vy, c.vx), c.len / 90);
    ctx.globalAlpha = 1;
  }

  function drawKamikaze(k) {
    drawSpr(SPR['kam' + ((k.thruster >> 1) & 1)], k.x, k.y);
  }

  function drawFighter(f) {
    if (f.t < 0) return;
    const spr = f.hitFlash > 0 ? SPR['fighter' + ((f.thr >> 1) & 1) + '_w'] : SPR['fighter' + ((f.thr >> 1) & 1)];
    drawSpr(spr, f.x, f.y);
  }

  function drawTurret(t) {
    const base = t.hitFlash > 0 ? SPR.turret_w : SPR.turret;
    drawSprRot(base, t.x, t.y, t.spin, (t.r * 2.5) / 56);
    // barrel tracks the nearest player once docked
    if (t.phase !== 'falling') {
      const tgt = nearestLivingPlayerTo(t.x, t.y);
      const ang = Math.atan2(tgt ? tgt.y - t.y : 1, tgt ? tgt.x - t.x : 0);
      drawSprPivot(SPR.barrel, t.x, t.y, ang, 4, 8);
    }
    if (t.hp < t.maxHp) {
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(t.x - 18, t.y - t.r - 8, 36, 3);
      ctx.fillStyle = '#5dd66c';
      ctx.fillRect(t.x - 18, t.y - t.r - 8, 36 * (t.hp / t.maxHp), 3);
    }
  }

  // Mothership mini-boss — pre-rendered hull sprite + pulsing aura ring;
  // hit flash is the white silhouette variant layered on top.
  function drawMothership() {
    if (!miniBoss) return;
    const m = miniBoss;
    const pulse = Math.sin(Date.now() / 240) * 0.18 + 0.66;
    ctx.globalAlpha = pulse;
    drawSprScaled(SPR.moshipAura, m.x, m.y + 4, 172, 72);
    ctx.globalAlpha = 1;
    drawSpr(SPR.moshipHull, m.x, m.y + 3);
    if (m.flash > 0) {
      ctx.globalAlpha = 0.5 + Math.random() * 0.4;
      drawSpr(SPR.moshipHull_w, m.x, m.y + 3);
      ctx.globalAlpha = 1;
    }
  }

  // Wingmen — small mini-ships flanking their owner.
  function drawWingman(w, p) {
    drawSpr(SPR.wingman, p.x + w.offsetX, p.y + w.offsetY);
  }

  // BEAM — the blue held laser: one pre-baked gradient strip stretched from
  // the nose to the top of the screen, plus a hot muzzle spot. Width scales
  // with weapon level, alpha flickers for energy.
  function drawBeam(p) {
    if (!p || !p.beamOn || !p.alive) return;
    const w = (beamHalfW(p.wlevel) * 2 + 8) * (0.92 + Math.random() * 0.16);
    const bot = p.y - 14;
    ctx.globalAlpha = 0.82 + Math.random() * 0.18;
    ctx.drawImage(SPR.beam.c, p.x - w / 2, 0, w, bot);
    ctx.globalAlpha = 1;
    drawSpr(muzzleSpr('#7fdcff'), p.x, bot);
    // energy glints riding up the beam
    const dot = dotSpr('#e6f7ff');
    for (let k = 0; k < 3; k++) {
      const sy = bot - ((Date.now() / 4 + k * 120) % Math.max(1, bot));
      ctx.drawImage(dot.c, p.x - 5, sy - 5, 10, 10);
    }
  }

  // Zorg — pre-rendered hull (dome, face, antennae, rim lights all baked),
  // aura ring pulsing via alpha, white variant for the hit flash.
  function drawZorg() {
    if (!zorg) return;
    const z = zorg;
    const pulse = Math.sin(Date.now() / 220) * 0.18 + 0.66;
    ctx.globalAlpha = pulse;
    drawSprScaled(SPR.zorgAura, z.x, z.y + 2, 150, 84);
    ctx.globalAlpha = 1;
    // hull baked with its origin 14px below the canvas centre — offset so
    // the sprite's saucer centre lines up with the collision circle at z.y
    drawSpr(SPR.zorgHull, z.x, z.y - 14);
    if (z.flash > 0) {
      ctx.globalAlpha = 0.5 + Math.random() * 0.4;
      drawSpr(SPR.zorgHull_w, z.x, z.y - 14);
      ctx.globalAlpha = 1;
    }
  }

  function drawExplosion(e) {
    const s = SPR.explo[e.tint][e.tier][e.f];
    if (e.f >= EXPLO_FRAMES - 2) ctx.globalAlpha = 0.65;
    drawSprScaled(s, e.x, e.y, s.w * e.k, s.h * e.k);
    if (e.f >= EXPLO_FRAMES - 2) ctx.globalAlpha = 1;
  }

  function drawParticle(pt) {
    const a = pt.life / pt.maxLife;
    ctx.globalAlpha = Math.max(0.1, a);
    const d = pt.size * 2.4 * Math.max(0.35, a);
    ctx.drawImage(pt.spr.c, pt.x - d / 2, pt.y - d / 2, d, d);
    ctx.globalAlpha = 1;
  }

  // Arcade HUD font — matches the console shell's Press Start 2P.
  const HUD_FONT = "'Press Start 2P', monospace";
  try { if (document.fonts && document.fonts.load) document.fonts.load("12px 'Press Start 2P'"); } catch {}

  const POWERUP_META = {
    vulcan:  { color: '#ff5252', mark: 'V' },   // red — Raiden vulcan
    beam:    { color: '#35a0ff', mark: 'L' },   // blue — Raiden laser
    homing:  { color: '#5dd66c', mark: 'M' },   // missiles
    shield:  { color: '#7fdcff', mark: 'S' },
    bomb:    { color: '#ffb24d', mark: 'B' },
    life:    { color: '#ff80b3', mark: '+' },
    magnet:  { color: '#c45fff', mark: 'G' },
    slowmo:  { color: '#aae6ff', mark: 'T' },
    wingmen: { color: '#ffe066', mark: 'W' },
  };
  for (const k of Object.keys(POWERUP_META)) bakeCrate(k, POWERUP_META[k].color);

  function drawPowerup(p) {
    const meta = POWERUP_META[p.kind] || POWERUP_META.vulcan;
    drawSprRot(SPR.crate[p.kind] || SPR.crate.vulcan, p.x, p.y, p.rotation);
    // letter mark stays upright (text is cheap and always crisp)
    ctx.font = '11px ' + HUD_FONT;
    ctx.textAlign = 'center';
    ctx.fillStyle = meta.color;
    ctx.fillText(meta.mark, p.x, p.y + 4.5);
    // Magnet pull halo when magnet is active — kids can see what's pulling
    let magnetOn = false;
    for (let pi = 0; pi < players.length; pi++) {
      if (players[pi].alive && players[pi].magnetTime > 0) { magnetOn = true; break; }
    }
    if (magnetOn) {
      ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 120) * 0.2;
      drawSprScaled(SPR.magnetRing, p.x, p.y, 34, 34);
      ctx.globalAlpha = 1;
    }
  }

  function drawFloatingText(ft) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, ft.time / 30));
    const sz = Math.max(8, Math.round((ft.size || 14) * 0.72));  // pixel font runs wide
    ctx.font = sz + 'px ' + HUD_FONT;
    ctx.textAlign = 'center';
    ctx.lineWidth = Math.max(3, sz * 0.3);
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    ctx.strokeText(ft.text, ft.x, ft.y);
    ctx.fillStyle = ft.color || '#ffe066';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }

  // Arcade-cabinet HUD — chunky pixel font, P1 gold panel left / P2 cyan
  // panel right, weapon name + level pips, bomb icons, shared score with
  // the combo multiplier centre-top. Sized to read from the couch.
  function hudText(txt, x, y, size, color, align) {
    ctx.font = size + 'px ' + HUD_FONT;
    ctx.textAlign = align || 'left';
    ctx.lineWidth = Math.max(3, size * 0.32);
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.strokeText(txt, x, y);
    ctx.fillStyle = color;
    ctx.fillText(txt, x, y);
  }

  function drawHUD() {
    // shared team score — top centre
    hudText('SCORE', VW / 2, 16, 8, '#7fdcff', 'center');
    hudText(String(score), VW / 2, 32, 13, scoreFlash > 0 ? '#ffe066' : '#fff', 'center');
    if (scoreFlash > 0) scoreFlash--;

    // wave label under the score
    const waveText = zorg ? 'ZORG'
                  : miniBoss ? 'MOTHERSHIP'
                  : ('WAVE ' + Math.min(wave, TOTAL_WAVES));
    hudText(waveText, VW / 2, 46, 8, '#7fdcff', 'center');

    // Combo readout — only when the streak is meaningful
    if (combo >= 3) {
      const m = comboMult();
      hudText(m + 'X ' + combo + ' COMBO', VW / 2, 64, 10, comboColor(), 'center');
      const w = 80;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(VW / 2 - w / 2 - 1, 69, w + 2, 4);
      ctx.fillStyle = comboColor();
      ctx.fillRect(VW / 2 - w / 2, 70, w * (comboTimer / COMBO_WINDOW), 2);
    }

    // Meteor shower active flag
    if (meteorShowerT > 0) hudText('! METEOR SHOWER !', VW / 2, 84, 8, '#ff5252', 'center');

    // per-player arcade panels — P1 gold left, P2 cyan right
    if (players[0]) drawPlayerPanel(players[0], false);
    if (players[1]) drawPlayerPanel(players[1], true);

    // fire hint (keyboard players)
    if (!document.body.classList.contains('touch')) {
      const p1 = players[0];
      hudText('BOMB [B]', 8, VH - 10, 8, p1 && p1.bombs > 0 ? '#ffb24d' : '#666', 'left');
      hudText('FIRE [SPACE]', VW - 8, VH - 10, 8, '#7fdcff', 'right');
    }

    // Mini-boss HP bar
    if (miniBoss && (state === PLAYING || state === WAVE_BANNER)) {
      const w = VW * 0.6;
      const x = VW / 2 - w / 2;
      const y = VH - 50;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(x - 3, y - 3, w + 6, 12);
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(x, y, w * (miniBoss.hp / miniBoss.maxHp), 6);
      hudText('MOTHERSHIP', VW / 2, y - 6, 8, '#fff', 'center');
    }

    // Boss HP bar (Zorg)
    if (zorg && (state === PLAYING || state === BOSS || state === WAVE_BANNER)) {
      const w = VW * 0.7;
      const x = VW / 2 - w / 2;
      const y = VH - 30;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(x - 3, y - 3, w + 6, 14);
      ctx.fillStyle = '#7ac010';
      ctx.fillRect(x, y, w * (zorg.hp / zorg.maxHp), 8);
      hudText('ZORG', VW / 2, y - 6, 8, '#fff', 'center');
    }
  }

  // Per-player cabinet panel: bezel + tag, lives icons, weapon name with
  // level pips, bomb icons. P1 left edge, P2 mirrored on the right.
  function drawPlayerPanel(p, right) {
    const w = 190, h = 64;
    const x = right ? VW - w : 0;
    const edge = p.idx === 1 ? 'rgba(53,224,255,0.8)' : 'rgba(255,210,77,0.8)';
    // chunky bezel: colour frame + dark inset (2 fills, no strokes)
    ctx.fillStyle = edge;
    ctx.fillRect(x, 0, w, h);
    ctx.fillStyle = 'rgba(6,6,18,0.82)';
    ctx.fillRect(x + 3, 3, w - 6, h - 8);

    const lx = right ? VW - 10 : 10;
    const tag = p.idx === 1 ? 'P2' : 'P1';
    hudText(tag, lx, 18, 10, p.idx === 1 ? '#35e0ff' : '#ffd24d', right ? 'right' : 'left');

    // lives — one ship icon + count (arcade style, and only 1 drawImage)
    if (p.lives > 0) {
      const spr = lifeIconSpr(p.shipColor);
      const ix = right ? VW - 40 : 40;
      ctx.drawImage(spr.c, ix - 8, 5, 16, 16);
      hudText('x' + p.lives, right ? ix - 12 : ix + 12, 18, 9, '#fff', right ? 'right' : 'left');
    } else {
      hudText('OUT', right ? VW - 36 : 36, 18, 9, '#ff5252', right ? 'right' : 'left');
    }

    // weapon name + level pips
    const wname = p.weapon === 'beam' ? 'LASER' : 'VULCAN';
    const wcol = p.weapon === 'beam' ? '#35a0ff' : '#ff5252';
    hudText(wname, lx, 36, 8, wcol, right ? 'right' : 'left');
    for (let i = 0; i < 4; i++) {
      const px = right ? VW - 76 - i * 9 : 76 + i * 9;
      ctx.fillStyle = i < p.wlevel ? wcol : 'rgba(255,255,255,0.18)';
      ctx.fillRect(px, 29, 6, 6);
    }

    // bombs — one icon + count
    if (p.bombs > 0) {
      const bx = right ? VW - 18 : 18;
      ctx.drawImage(SPR.bombIcon.c, bx - 7, 41, 14, 16);
      hudText('x' + p.bombs, right ? bx - 12 : bx + 12, 55, 9, '#ffb24d', right ? 'right' : 'left');
    } else {
      hudText('NO BOMBS', right ? VW - 12 : 12, 55, 7, '#666', right ? 'right' : 'left');
    }

    // timed-buff bars below the panel
    drawBuffBar(0, p.shieldTime,  600, '#7fdcff', 'SHIELD',  right);
    drawBuffBar(1, p.homingTime,  700, '#5dd66c', 'MISSILE', right);
    drawBuffBar(2, p.magnetTime,  900, '#c45fff', 'MAGNET',  right);
    drawBuffBar(3, p.slowTime,    360, '#aae6ff', 'SLOW-MO', right);
    drawBuffBar(4, p.wingmenTime, 720, '#ffe066', 'WINGMEN', right);
  }

  // Buff bar — column under the owning player's panel
  function drawBuffBar(slot, value, max, color, label, right) {
    if (!value || value <= 0) return;
    const w = 78;
    const x = right ? VW - 10 - w : 10;
    const y = 72 + slot * 13;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x, y, w, 7);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w * Math.min(1, value / max), 7);
    hudText(label, right ? x - 5 : x + w + 5, y + 7, 7, '#fff', right ? 'right' : 'left');
  }

  function drawBanner() {
    if (state !== WAVE_BANNER && state !== VICTORY) return;
    if (bannerTime <= 0) return;
    const fade = Math.min(1, bannerTime / 30);
    ctx.save();
    ctx.globalAlpha = fade;
    hudText(bannerText, VW / 2, VH / 2 - 6, 30, state === VICTORY ? '#ffe066' : '#7fdcff', 'center');
    hudText(bannerSub, VW / 2, VH / 2 + 26, 12, '#fff', 'center');
    ctx.restore();
  }

  function draw() {
    // black backdrop (letterbox)
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#02020a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    applyCamera();
    // three pre-rendered parallax layers, 2 drawImage each
    drawParallax();
    for (const c of bgComets) drawBgComet(c);

    for (const p of powerups)       drawPowerup(p);
    for (const t of turrets)        drawTurret(t);
    _trailBudget = 8;
    for (const m of meteors)        drawMeteor(m);
    for (const f of fighters)       drawFighter(f);
    for (const k of kamikazes)      drawKamikaze(k);
    for (const u of ufos)           drawUFO(u);
    drawMothership();
    drawZorg();
    if (state === PLAYING || state === BOSS || state === WAVE_BANNER) {
      for (let pi = 0; pi < players.length; pi++) {
        const p = players[pi];
        if (!p.alive) continue;
        drawBeam(p);
        for (const w of p.wingmen)  drawWingman(w, p);
        drawShip(p);
      }
    }
    for (const b of bullets)        drawBullet(b);
    for (const b of enemyBullets)   drawEnemyBullet(b);
    for (let i = 0; i < EXPLO_MAX; i++) if (explosions[i].active) drawExplosion(explosions[i]);
    for (let i = 0; i < PART_MAX; i++)  if (particles[i].active)  drawParticle(particles[i]);
    for (const ft of floatingTexts) drawFloatingText(ft);

    // bomb detonation — full-screen white flash overlay (single fill)
    if (bombFlashT > 0) {
      bombFlashT--;
      ctx.globalAlpha = Math.min(0.85, bombFlashT / 14);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, VW, VH);
      ctx.globalAlpha = 1;
    }

    drawHUD();
    drawBanner();
  }

  // ───── main loop ─────
  function tick() {
    pollMenuGamepad();
    // banner countdown also runs while waiting
    // Hit-pause: freeze enemy/meteor updates for a handful of frames after a
    // big kill. Player + draw still run so the shot lands visually crisp.
    const paused = hitPauseT > 0;
    if (paused) hitPauseT--;

    // parallax scroll — ties subtly to wave intensity (menu idles slowly)
    if (state !== PAUSED) bgScroll += 1.2 * bgSpeedK();

    if (state === WAVE_BANNER) {
      bannerTime--;
      updateExplosionsParticlesText();
      updateBgComets();
      updatePlayers();
      updateBullets();
      updateBeam();
      // bosses handle their own entry transition during the banner
      if (!paused) {
        updateFighters();
        if (zorg)     updateZorg();
        if (miniBoss) updateMothership();
      }
      if (bannerTime <= 0) state = PLAYING;
    } else if (state === PLAYING) {
      updatePlayers();
      updateBullets();
      updateBeam();
      if (!paused) {
        updateMeteors();
        updateUFOs();
        updateKamikazes();
        updateFighters();
        updateTurrets();
        updatePowerups();
        updateMeteorShower();
      }
      updateCollisions();
      updateExplosionsParticlesText();
      updateBgComets();
      updateCombo();
      if (!paused) {
        updateWave();
        if (miniBoss) updateMothership();
        if (zorg)     updateZorg();
      }
    } else if (state === DEAD || state === VICTORY) {
      updateBullets();
      updateMeteors();
      updateUFOs();
      updateKamikazes();
      updateFighters();
      updateTurrets();
      updateExplosionsParticlesText();
      updateBgComets();
      if (zorg)     updateZorg();
      if (miniBoss) updateMothership();
      if (state === VICTORY && bannerTime > 0) bannerTime--;
    }

    if (shake > 0) shake = Math.max(0, shake - 0.7);

    draw();
  }
  // Driving the loop from rAF directly (rather than from inside tick) means
  // a thrown frame still reschedules — we'd rather log + recover than silently
  // freeze the whole game on a single bad frame.
  function loop() {
    try { tick(); } catch (err) { console.error('meteor-blaster frame error:', err); }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
</body>
</html>
