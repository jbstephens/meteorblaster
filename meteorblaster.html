<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meteor Blaster">
<title>Meteor Blaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://ses.q5labs.co/lib/controller.js"></script>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
    color: #fff;
    touch-action: none;
  }
  #game { position: fixed; inset: 0; display: block; }

  /* On-screen controls (iPad FamiCom-style D-pad + action button) — same
     CSS pattern as Phaser Wars: chunky semi-transparent circular buttons
     pinned to the safe-area corners, only shown on touch devices in-match. */
  .controls {
    position: fixed; top: 0; bottom: 0;
    display: none; flex-direction: column;
    justify-content: flex-end;
    padding: max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    gap: 12px;
    z-index: 5; pointer-events: none;
  }
  body.touch.in-match .controls { display: flex; }
  body.paused .controls { display: none; }
  /* When a gamepad becomes the active input, hide the touch d-pad and the
     on-screen FIRE/BOMB cluster — the player is using a controller. The
     ArcadeController library toggles body.input-pad / input-touch / input-kbd. */
  body.input-pad .controls { display: none !important; }
  body.input-pad .pilot-card { cursor: default; }
  .controls.left  { left: 0;  align-items: flex-start; }
  .controls.right { right: 0; align-items: flex-end;   }
  .row { display: flex; gap: 12px; pointer-events: auto; align-items: center; justify-content: center; }
  .btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 3px solid rgba(255,255,255,0.35);
    color: #fff; font-size: 26px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    transition: transform 0.06s, background 0.06s;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  /* Primary action — big FIRE button, in the pilot's bolt colour. */
  .btn.fire {
    width: 104px; height: 104px;
    font-size: 18px; letter-spacing: 2px; font-weight: 900;
    background: rgba(127,220,255,0.22);
    border-color: rgba(127,220,255,0.7);
    color: #7fdcff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }
  .btn.fire.held { background: rgba(127,220,255,0.5); }
  /* Secondary action — smaller BOMB button, sits beside FIRE like Phaser
     Wars' switch button sits beside attack. */
  .btn.bomb {
    width: 64px; height: 64px;
    font-size: 11px; letter-spacing: 1.5px; font-weight: 900;
    background: rgba(255,180,77,0.22);
    border-color: rgba(255,180,77,0.7);
    color: #ffe066;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }
  .btn.bomb.held  { background: rgba(255,180,77,0.5); }
  .btn.bomb.empty { opacity: 0.35; }
  .btn.held       { background: rgba(255,255,255,0.4); transform: scale(0.93); }

  /* D-pad layout — column with three rows (up, left+right, down) so it
     reads as a + shape, just like a NES/Famicom controller. */
  .dpad { display: flex; flex-direction: column; gap: 8px; pointer-events: auto; align-items: center; }
  .dpad .row { gap: 8px; }
  .dpad .spacer { width: 64px; height: 64px; pointer-events: none; }

  /* Pause button — top-right, kid-finger friendly */
  .hud-btn {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    right: max(12px, env(safe-area-inset-right));
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.55);
    color: #fff;
    font-size: 24px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 6;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    font-family: inherit;
    touch-action: manipulation;
  }
  body.in-match .hud-btn { display: flex; }
  body.paused   .hud-btn { display: none; }
  /* Controller players pause with START — hide the touch pause button too */
  body.input-pad .hud-btn { display: none; }
  .hud-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.35); }

  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.78);
    text-align: center; padding: 20px;
    z-index: 10; overflow-y: auto;
  }
  .overlay h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(20px, 4vw, 40px);
    letter-spacing: 2px;
    margin-bottom: 14px;
    color: #ffd24d;
    text-shadow: 0 4px 0 #7a3800, 0 6px 16px rgba(255,150,40,0.45);
  }
  .overlay .sub { font-family: 'Press Start 2P', monospace; font-size: clamp(9px, 1.5vw, 14px); opacity: 0.9; margin-bottom: 18px; letter-spacing: 1px; line-height: 1.7; }
  .overlay .help { font-size: clamp(12px, 1.7vw, 15px); line-height: 1.6; opacity: 0.85; margin-bottom: 18px; max-width: 560px; }
  .overlay button {
    font-size: clamp(18px, 2.6vw, 24px); padding: 14px 28px;
    border-radius: 12px; border: none; background: #fff; color: #000;
    font-weight: 800; letter-spacing: 1px; cursor: pointer; margin: 6px;
    touch-action: manipulation;
  }
  .overlay button.secondary {
    background: transparent; color: #fff;
    border: 2px solid rgba(255,255,255,0.55);
    font-size: clamp(14px, 2vw, 18px); padding: 10px 22px;
  }
  .overlay button:active { transform: scale(0.97); }
  .hidden { display: none !important; }

  .pilots {
    display: flex; gap: 14px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 18px;
  }
  .pilot-card {
    width: clamp(96px, 17vw, 130px);
    aspect-ratio: 1 / 1.15;
    border-radius: 16px;
    background: var(--c);
    color: #fff;
    border: 4px solid transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 10px 6px 14px;
    font-family: inherit;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s, border-color 0.1s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    touch-action: manipulation;
  }
  .pilot-card:active { transform: scale(0.96); }
  .pilot-card.selected { border-color: #ffd24d; transform: scale(1.05); }
  /* P2's selection cursor — cyan outline offset outward so both cursors stay
     readable when both players hover the same pilot. */
  .pilot-card.p2sel { outline: 4px solid #35e0ff; outline-offset: 3px; }
  .pilot-card .ptag {
    position: absolute; top: 6px; left: 8px;
    font-size: 11px; font-weight: 900; letter-spacing: 1px;
    padding: 2px 8px; border-radius: 99px;
    background: #ffd24d; color: #000;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    z-index: 4;
  }
  .pilot-card .ptag.p2 { top: auto; bottom: 6px; background: #35e0ff; }
  .pilot-card .face {
    width: 48%; aspect-ratio: 1;
    background: var(--skin);
    border-radius: 50%;
    margin-bottom: 8px;
    border-top: 8px solid rgba(0,0,0,0.55);
    position: relative;
    z-index: 2;
  }
  .pilot-card .face::before, .pilot-card .face::after {
    content:''; position: absolute; top: 45%; width: 8%; aspect-ratio: 1;
    background: #222; border-radius: 50%;
  }
  .pilot-card .face::before { left: 30%; }
  .pilot-card .face::after  { right: 30%; }
  .pilot-card .card-hair { display: none; }
  .pilot-card[data-hair="long"] .face { border-top-color: transparent; }
  .pilot-card[data-hair="long"] .card-hair {
    display: block;
    position: absolute;
    width: 62%; height: 56%;
    top: 8%; left: 19%;
    background: var(--hair);
    border-radius: 50% 50% 40% 40% / 55% 55% 45% 45%;
    z-index: 1;
  }
  .pilot-card[data-hair="long"] .card-hair::after {
    content: '';
    position: absolute;
    top: 28%; left: 8%;
    width: 84%; height: 22%;
    background: var(--hair);
    border-radius: 50% 50% 40% 40% / 80% 80% 30% 30%;
    transform: rotate(-6deg);
  }
  .pilot-card .name {
    font-family: 'Press Start 2P', monospace;
    font-weight: 400;
    font-size: clamp(11px, 1.6vw, 15px);
    letter-spacing: 1px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.6);
    z-index: 3;
  }
  .pilot-card .hi {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 11px; font-weight: 800;
    background: #ffe066; color: #000;
    padding: 2px 8px;
    border-radius: 99px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    z-index: 4;
    letter-spacing: 1px;
  }
  .label {
    font-size: clamp(15px, 2.4vw, 20px);
    font-weight: 800;
    letter-spacing: 3px;
    margin-bottom: 14px;
    color: #7fdcff;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<button id="pauseBtn" class="hud-btn" aria-label="Pause">II</button>

<!-- iPad on-screen controls — D-pad on the left, BOMB action on the right.
     Same chunky NES/Famicom-style buttons used by the family fighting game. -->
<div class="controls left">
  <div class="dpad">
    <div class="row"><div class="btn" data-act="up"    aria-label="Up">&#9650;</div></div>
    <div class="row">
      <div class="btn" data-act="left"  aria-label="Left">&#9664;</div>
      <div class="spacer"></div>
      <div class="btn" data-act="right" aria-label="Right">&#9654;</div>
    </div>
    <div class="row"><div class="btn" data-act="down"  aria-label="Down">&#9660;</div></div>
  </div>
</div>
<div class="controls right">
  <div class="row">
    <div class="btn bomb" id="bombBtn" data-act="bomb" aria-label="Bomb">BOMB</div>
    <div class="btn fire" id="fireBtn" data-act="fire" aria-label="Fire">FIRE</div>
  </div>
</div>

<!-- Title / pilot select -->
<div id="titleOverlay" class="overlay">
  <h1>METEOR BLASTER</h1>
  <div class="sub" id="titleSub">PICK YOUR PILOT</div>
  <div class="pilots" id="pilots"></div>
  <div class="sub" id="joinHint" style="display:none;color:#35e0ff;">P2 PRESS &#10005; TO JOIN</div>
  <div class="help">
    Steer your ship and blast the falling rocks.<br>
    Grab <b style="color:#ff6b6b">V</b> vulcan and <b style="color:#5fb0ff">L</b> laser crates to power up.<br>
    Survive 7 waves to face <b>ZORG</b>.
  </div>
  <button id="startBtn">START</button>
</div>

<!-- Pause -->
<div id="pauseOverlay" class="overlay hidden">
  <h1>PAUSED</h1>
  <button id="resumeBtn">RESUME</button>
  <button id="quitBtn" class="secondary">QUIT TO TITLE</button>
</div>

<!-- Game over / victory -->
<div id="endOverlay" class="overlay hidden">
  <h1 id="endTitle">GAME OVER</h1>
  <div class="sub" id="endSub">FINAL SCORE: 0</div>
  <div id="endHi" class="sub" style="opacity:0.7;letter-spacing:2px;"></div>
  <button id="againBtn">PLAY AGAIN</button>
  <button id="endQuitBtn" class="secondary">CHANGE PILOT</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Logical resolution — same shape as fightinggame; ship moves in 2D
  const VW = 800, VH = 450;

  let scale = 1, offX = 0, offY = 0;
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth, h = window.innerHeight;
    canvas.width  = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    scale = Math.min(canvas.width / VW, canvas.height / VH);
    offX = (canvas.width - VW * scale) / 2;
    offY = (canvas.height - VH * scale) / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouch) document.body.classList.add('touch');

  // ───── home-screen icon (canvas → data URI) ─────
  // Same dark space backdrop as the rest of the family arcade. A glowing
  // orange meteor crossed by a blue laser bolt — matches the saber/comet
  // composition language of the existing tiles.
  (function installAppIcon() {
    const c = document.createElement('canvas');
    c.width = c.height = 180;
    const cx = c.getContext('2d');

    cx.fillStyle = '#0a0a20';
    cx.fillRect(0, 0, 180, 180);
    const grd = cx.createRadialGradient(90, 90, 30, 90, 90, 135);
    grd.addColorStop(0, '#252560');
    grd.addColorStop(1, '#000');
    cx.fillStyle = grd;
    cx.fillRect(0, 0, 180, 180);

    for (let i = 0; i < 30; i++) {
      cx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.55})`;
      cx.beginPath();
      cx.arc(Math.random() * 180, Math.random() * 180, Math.random() * 1.4 + 0.4, 0, Math.PI * 2);
      cx.fill();
    }

    // Meteor with fiery trail (going down-right). Glows are baked with
    // gradients — never shadowBlur (the console shell no-ops it globally).
    cx.save();
    const trailGlow = cx.createRadialGradient(75, 75, 6, 75, 75, 70);
    trailGlow.addColorStop(0, 'rgba(255,140,40,0.55)');
    trailGlow.addColorStop(1, 'rgba(255,140,40,0)');
    cx.fillStyle = trailGlow;
    cx.fillRect(0, 0, 180, 180);
    cx.strokeStyle = 'rgba(255,140,40,0.7)';
    cx.lineWidth = 18; cx.lineCap = 'round';
    cx.beginPath();
    cx.moveTo(36, 36); cx.lineTo(110, 110);
    cx.stroke();
    const rockGlow = cx.createRadialGradient(118, 118, 8, 118, 118, 52);
    rockGlow.addColorStop(0, 'rgba(255,110,40,0.8)');
    rockGlow.addColorStop(1, 'rgba(255,110,40,0)');
    cx.fillStyle = rockGlow;
    cx.fillRect(66, 66, 108, 108);
    cx.fillStyle = '#aa3300';
    cx.beginPath(); cx.arc(118, 118, 24, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = '#ff9944';
    cx.beginPath(); cx.arc(112, 112, 12, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = '#fff7d0';
    cx.beginPath(); cx.arc(108, 108, 5, 0, Math.PI * 2); cx.fill();
    cx.restore();

    // Player ship blaster bolt rising from bottom-left
    cx.save();
    const boltGlow = cx.createRadialGradient(56, 120, 4, 56, 120, 48);
    boltGlow.addColorStop(0, 'rgba(127,220,255,0.6)');
    boltGlow.addColorStop(1, 'rgba(127,220,255,0)');
    cx.fillStyle = boltGlow;
    cx.fillRect(8, 72, 96, 96);
    cx.strokeStyle = '#7fdcff'; cx.lineWidth = 8; cx.lineCap = 'round';
    cx.beginPath();
    cx.moveTo(40, 150); cx.lineTo(72, 90);
    cx.stroke();
    cx.strokeStyle = '#fff'; cx.lineWidth = 3;
    cx.beginPath();
    cx.moveTo(40, 150); cx.lineTo(72, 90);
    cx.stroke();
    cx.restore();

    const url = c.toDataURL('image/png');
    document.querySelectorAll('link[rel="apple-touch-icon"], link[rel="apple-touch-icon-precomposed"], link[rel="icon"]').forEach(l => l.remove());
    const links = [
      { rel: 'apple-touch-icon',              href: url, sizes: '180x180' },
      { rel: 'apple-touch-icon-precomposed',  href: url, sizes: '180x180' },
      { rel: 'icon', type: 'image/png',       href: url, sizes: '180x180' },
    ];
    for (const cfg of links) {
      const link = document.createElement('link');
      Object.entries(cfg).forEach(([k, v]) => link.setAttribute(k, v));
      document.head.appendChild(link);
    }
  })();

  // ───── pilot roster (matches family-game look from Phaser Wars) ─────
  const PILOTS = {
    ben:  { id:'ben',  name:'BEN',  color:'#3aa0ff', boltColor:'#7fdcff', skinColor:'#f3d0a8', hair:'short',
            voice:{ pitch:1.7, rate:1.25, taunts:["Got it!","Take that!","Boom!","Got you!"] } },
    luke: { id:'luke', name:'LUKE', color:'#ff5252', boltColor:'#ff8a8a', skinColor:'#e8b988', hair:'short',
            voice:{ pitch:1.8, rate:1.35, taunts:["Hahaha!","Booyah!","Pow!","Owned!"] } },
    mom:  { id:'mom',  name:'MOM',  color:'#ff6bb3', boltColor:'#ffc1e0', skinColor:'#f5d6b3', hair:'long', hairColor:'#a8336e',
            voice:{ pitch:1.3, rate:1.05, taunts:["Yes!","Got 'em!","Easy!","Nailed it!"] } },
    dad:  { id:'dad',  name:'DAD',  color:'#4caf50', boltColor:'#b0ff90', skinColor:'#e3b388', hair:'short',
            voice:{ pitch:0.7, rate:0.95, taunts:["Booyah!","Oh yeah!","Got 'em!","Champion!"] } },
  };
  const PILOT_ORDER = ['ben', 'luke', 'mom', 'dad'];

  // ───── persistent high scores per pilot ─────
  const HISCORE_KEY = 'meteorBlaster.hi.v1';
  function loadHi() {
    try { return JSON.parse(localStorage.getItem(HISCORE_KEY)) || {}; } catch { return {}; }
  }
  function saveHi(hi) {
    try { localStorage.setItem(HISCORE_KEY, JSON.stringify(hi)); } catch {}
  }
  let hiscores = loadHi();

  // ───── audio core (synthesized, no assets) ─────
  let audioCtx;
  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function blip(freq, dur, type='square', vol=0.07, sweepTo=null) {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (sweepTo != null) o.frequency.exponentialRampToValueAtTime(sweepTo, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t0); o.stop(t0 + dur);
  }
  function noiseBurst(durSec, peakGain, lpStart, lpEnd) {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const sr = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, Math.floor(sr * durSec), sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length * 0.6);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(lpStart, t0);
    filt.frequency.exponentialRampToValueAtTime(lpEnd, t0 + durSec);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peakGain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + durSec);
    src.connect(filt).connect(g).connect(audioCtx.destination);
    src.start(t0); src.stop(t0 + durSec + 0.05);
  }
  const sfx = {
    shot:      () => blip(880, 0.08, 'square',   0.05, 1400),
    bigShot:   () => blip(540, 0.12, 'sawtooth', 0.07, 1800),
    hit:       () => blip(180, 0.07, 'square',   0.07, 90),
    boom:      () => { noiseBurst(0.30, 0.24, 2200, 160); blip(140, 0.25, 'sawtooth', 0.13, 40); },
    smallBoom: () => { noiseBurst(0.16, 0.14, 1800, 240); blip(220, 0.16, 'sawtooth', 0.08, 80); },
    pickup:    () => { [660,880,1320,1760].forEach((f,i)=>setTimeout(()=>blip(f,0.08,'triangle',0.06),i*55)); },
    shield:    () => { [330,440,660].forEach((f,i)=>setTimeout(()=>blip(f,0.16,'sine',0.05),i*55)); },
    bomb:      () => {
      noiseBurst(0.55, 0.30, 2600, 80);
      blip(110, 0.55, 'sawtooth', 0.18, 30);
      setTimeout(()=>blip(440, 0.35, 'square', 0.10, 90), 60);
    },
    death:     () => {
      if (!audioCtx) return;
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(280, t0);
      o.frequency.exponentialRampToValueAtTime(40, t0 + 1.1);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.28, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.2);
      o.connect(g).connect(audioCtx.destination);
      o.start(t0); o.stop(t0 + 1.25);
      noiseBurst(0.6, 0.22, 2200, 100);
    },
    warn:      () => { blip(900, 0.08, 'square', 0.05); setTimeout(()=>blip(900, 0.08, 'square', 0.05), 200); },
    waveStart: () => { blip(660, 0.14, 'triangle', 0.08, 990); setTimeout(()=>blip(990, 0.18, 'triangle', 0.08, 1320), 90); },
    bossAppear:() => {
      noiseBurst(0.8, 0.28, 3200, 80);
      [110,82,55].forEach((f,i)=>setTimeout(()=>blip(f, 0.45, 'sawtooth', 0.18, f*0.7), i*180));
    },
  };

  // Voice via SpeechSynthesis — same approach as Phaser Wars
  function speakVoice(pilotId, line) {
    if (!('speechSynthesis' in window)) return;
    const f = PILOTS[pilotId];
    if (!f || !f.voice) return;
    try {
      const text = line || f.voice.taunts[Math.floor(Math.random() * f.voice.taunts.length)];
      const u = new SpeechSynthesisUtterance(text);
      u.pitch = f.voice.pitch;
      u.rate  = f.voice.rate;
      u.volume = 0.9;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    } catch {}
  }

  // ═══════════════════════════════════════════════════════════════════════
  // SPRITE ATLAS — every entity is drawn ONCE here into offscreen canvases
  // at load time; the per-frame render path is drawImage-only (the Pi 5
  // dies on per-frame arc/fill/stroke). No shadowBlur anywhere — the
  // console shell no-ops it globally, so every glow is baked with
  // radial/linear gradients and the game looks identical on and off it.
  // ═══════════════════════════════════════════════════════════════════════
  const SS = 3; // supersample factor so sprites stay crisp at 1280x720

  function colorToRgbArr(cstr) {
    if (cstr[0] === '#') {
      const n = parseInt(cstr.slice(1), 16);
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }
    const m = cstr.match(/(\d+),\s*(\d+),\s*(\d+)/);
    return m ? [+m[1], +m[2], +m[3]] : [255, 255, 255];
  }
  function rgba(cstr, a) {
    const [r, g, b] = colorToRgbArr(cstr);
    return `rgba(${r},${g},${b},${a})`;
  }
  function shade(cstr, k) {
    const [r, g, b] = colorToRgbArr(cstr);
    const f = (v) => Math.max(0, Math.min(255, Math.round(k < 0 ? v * (1 + k) : v + (255 - v) * k)));
    return `rgb(${f(r)},${f(g)},${f(b)})`;
  }
  // Hue-shift a colour toward cyan — used to tint P2's ship so two kids
  // flying the same pilot can still tell their ships apart at a glance.
  function tintToCyan(hex, k) {
    const [r, g, b] = colorToRgbArr(hex);
    return 'rgb(' + Math.round(r + (0 - r) * k) + ',' +
                    Math.round(g + (229 - g) * k) + ',' +
                    Math.round(b + (255 - b) * k) + ')';
  }

  function bake(w, h, fn, ss = SS) {
    const c = document.createElement('canvas');
    c.width = Math.max(1, Math.round(w * ss));
    c.height = Math.max(1, Math.round(h * ss));
    const g = c.getContext('2d');
    g.scale(ss, ss);
    fn(g, w, h);
    return { c, w, h };
  }
  // White silhouette copy of a sprite — the 1-frame hit flash on enemies.
  function whiten(s) {
    const c = document.createElement('canvas');
    c.width = s.c.width; c.height = s.c.height;
    const g = c.getContext('2d');
    g.drawImage(s.c, 0, 0);
    g.globalCompositeOperation = 'source-in';
    g.fillStyle = '#fff';
    g.fillRect(0, 0, c.width, c.height);
    return { c, w: s.w, h: s.h };
  }
  // Baked radial glow — replaces every old shadowBlur halo.
  function glowDot(g, x, y, r, color, a = 0.8) {
    const gr = g.createRadialGradient(x, y, 0, x, y, r);
    gr.addColorStop(0, rgba(color, a));
    gr.addColorStop(0.55, rgba(color, a * 0.35));
    gr.addColorStop(1, rgba(color, 0));
    g.fillStyle = gr;
    g.beginPath(); g.arc(x, y, r, 0, Math.PI * 2); g.fill();
  }

  // Per-frame sprite draw helpers. drawSprRot resets straight back to the
  // camera transform (cheaper than save/restore in the hot path).
  let _camX = 0, _camY = 0;
  function drawSpr(s, x, y) {
    ctx.drawImage(s.c, x - s.w / 2, y - s.h / 2, s.w, s.h);
  }
  function drawSprScaled(s, x, y, w, h) {
    ctx.drawImage(s.c, x - w / 2, y - h / 2, w, h);
  }
  function drawSprRot(s, x, y, rot, sc = 1) {
    ctx.translate(x, y);
    ctx.rotate(rot);
    const w = s.w * sc, h = s.h * sc;
    ctx.drawImage(s.c, -w / 2, -h / 2, w, h);
    ctx.setTransform(scale, 0, 0, scale, _camX, _camY);
  }
  // Rotate around an off-centre pivot (turret barrels).
  function drawSprPivot(s, x, y, rot, px, py) {
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.drawImage(s.c, -px, -py, s.w, s.h);
    ctx.setTransform(scale, 0, 0, scale, _camX, _camY);
  }

  const SPR = {};

  // ── player ships: pilot × P1/P2 tint × 3 banking frames (L/N/R) ──
  function bakeShipHull(g, hullColor, skinColor) {
    // engine glow baked under the tail
    glowDot(g, 0, 13, 9, '#ffce4d', 0.5);
    // main delta hull — vertical sheen, chunky dark outline
    const grd = g.createLinearGradient(0, -16, 0, 12);
    grd.addColorStop(0, shade(hullColor, 0.35));
    grd.addColorStop(0.55, hullColor);
    grd.addColorStop(1, shade(hullColor, -0.45));
    g.fillStyle = grd;
    g.strokeStyle = 'rgba(0,0,0,0.75)';
    g.lineWidth = 2; g.lineJoin = 'round';
    g.beginPath();
    g.moveTo(0, -16);
    g.lineTo(14, 12);
    g.lineTo(6, 8);
    g.lineTo(-6, 8);
    g.lineTo(-14, 12);
    g.closePath();
    g.fill(); g.stroke();
    // gray wing plates + wingtip cannons (Raiden-style hardware)
    g.fillStyle = '#3a3a4c';
    g.fillRect(-15, 6, 9, 5);
    g.fillRect(6, 6, 9, 5);
    g.fillStyle = '#20202e';
    g.fillRect(-13, 2, 3, 7);
    g.fillRect(10, 2, 3, 7);
    // nose stripe highlight
    g.strokeStyle = 'rgba(255,255,255,0.55)';
    g.lineWidth = 1.6;
    g.beginPath(); g.moveTo(0, -14); g.lineTo(-6, 2); g.stroke();
    // canopy + pilot face peeking out (pilot identity)
    glowDot(g, 0, -4, 7, '#7fdcff', 0.5);
    g.fillStyle = skinColor;
    g.beginPath(); g.arc(0, -2, 4, 0, Math.PI * 2); g.fill();
    g.fillStyle = '#7fdcff';
    g.beginPath(); g.arc(0, -4, 6, Math.PI, 2 * Math.PI); g.fill();
    g.fillStyle = 'rgba(255,255,255,0.85)';
    g.beginPath(); g.arc(-2, -6, 1.4, 0, Math.PI * 2); g.fill();
  }
  for (const pid of PILOT_ORDER) {
    const f = PILOTS[pid];
    for (let idx = 0; idx < 2; idx++) {
      const hull = idx === 1 ? tintToCyan(f.color, 0.45) : f.color;
      for (let bank = 0; bank < 3; bank++) {         // 0 = left, 1 = neutral, 2 = right
        SPR['ship_' + pid + '_' + idx + '_' + bank] = bake(46, 42, (g) => {
          g.translate(23, 22);
          if (bank !== 1) { g.rotate((bank - 1) * 0.12); g.scale(0.78, 1); }
          bakeShipHull(g, hull, f.skinColor);
        });
      }
    }
  }
  // thruster flames — two frames alternated for flicker
  SPR.flame0 = bake(12, 14, (g) => {
    glowDot(g, 6, 5, 6, '#ffce4d', 0.7);
    g.fillStyle = '#ffce4d';
    g.beginPath(); g.moveTo(1, 1); g.lineTo(11, 1); g.lineTo(6, 11); g.closePath(); g.fill();
    g.fillStyle = '#fff7d0';
    g.beginPath(); g.moveTo(4, 1); g.lineTo(8, 1); g.lineTo(6, 7); g.closePath(); g.fill();
  });
  SPR.flame1 = bake(12, 18, (g) => {
    glowDot(g, 6, 6, 7, '#ff9944', 0.7);
    g.fillStyle = '#ff9944';
    g.beginPath(); g.moveTo(1, 1); g.lineTo(11, 1); g.lineTo(6, 15); g.closePath(); g.fill();
    g.fillStyle = '#fff7d0';
    g.beginPath(); g.moveTo(4, 1); g.lineTo(8, 1); g.lineTo(6, 9); g.closePath(); g.fill();
  });
  // shield bubble ring
  SPR.shield = bake(56, 56, (g) => {
    const gr = g.createRadialGradient(28, 28, 16, 28, 28, 27);
    gr.addColorStop(0, 'rgba(127,220,255,0)');
    gr.addColorStop(0.72, 'rgba(127,220,255,0.10)');
    gr.addColorStop(0.9, 'rgba(127,220,255,0.75)');
    gr.addColorStop(1, 'rgba(200,245,255,0)');
    g.fillStyle = gr;
    g.beginPath(); g.arc(28, 28, 27, 0, Math.PI * 2); g.fill();
  });

  // ── bolts / muzzle flashes / enemy shots / debris dots (cached by colour) ──
  const _boltCache = {}, _muzzleCache = {}, _shotCache = {}, _dotCache = {};
  function boltSpr(color) {
    let s = _boltCache[color];
    if (!s) {
      s = _boltCache[color] = bake(14, 26, (g) => {
        glowDot(g, 7, 13, 7, color, 0.55);
        g.fillStyle = color;
        g.beginPath();
        g.moveTo(7, 2); g.lineTo(10.5, 8); g.lineTo(10.5, 22); g.lineTo(3.5, 22); g.lineTo(3.5, 8);
        g.closePath(); g.fill();
        g.fillStyle = '#fff';
        g.beginPath();
        g.moveTo(7, 4); g.lineTo(9, 9); g.lineTo(9, 19); g.lineTo(5, 19); g.lineTo(5, 9);
        g.closePath(); g.fill();
      });
    }
    return s;
  }
  function muzzleSpr(color) {
    let s = _muzzleCache[color];
    if (!s) {
      s = _muzzleCache[color] = bake(20, 20, (g) => {
        glowDot(g, 10, 10, 10, color, 0.85);
        g.fillStyle = '#fff';
        g.beginPath();
        g.moveTo(10, 2); g.lineTo(12, 8); g.lineTo(18, 10); g.lineTo(12, 12);
        g.lineTo(10, 18); g.lineTo(8, 12); g.lineTo(2, 10); g.lineTo(8, 8);
        g.closePath(); g.fill();
      });
    }
    return s;
  }
  function shotSpr(color) {
    let s = _shotCache[color];
    if (!s) {
      s = _shotCache[color] = bake(24, 24, (g) => {
        glowDot(g, 12, 12, 12, color, 0.75);
        g.fillStyle = color;
        g.beginPath(); g.arc(12, 12, 5.6, 0, Math.PI * 2); g.fill();
        g.fillStyle = '#fff';
        g.beginPath(); g.arc(11, 11, 2.6, 0, Math.PI * 2); g.fill();
      });
    }
    return s;
  }
  function dotSpr(color) {
    let s = _dotCache[color];
    if (!s) {
      s = _dotCache[color] = bake(10, 10, (g) => {
        glowDot(g, 5, 5, 5, color, 0.9);
        g.fillStyle = '#fff';
        g.fillRect(3.6, 3.6, 2.8, 2.8);
      });
    }
    return s;
  }

  // ── meteors: 3 kinds × 3 rock variants, highlight/shadow pre-baked so
  //    they spin with a plain rotation transform. Plus a trail per kind. ──
  const METEOR_PAL = {
    rock:     { core: '#8a3a1a', dark: '#4a1c0a', lite: '#d06a30', glint: '#ffb070', glow: '#ff5500' },
    ice:      { core: '#3a6a9a', dark: '#1c3a60', lite: '#8ecdf2', glint: '#e8f8ff', glow: '#aae6ff' },
    splitter: { core: '#2a7030', dark: '#123a18', lite: '#5dd66c', glint: '#c5ffce', glow: '#5dd66c' },
  };
  const MET_R = 30; // baked radius; drawn scaled to each meteor's r
  for (const kind of Object.keys(METEOR_PAL)) {
    const P = METEOR_PAL[kind];
    for (let v = 0; v < 3; v++) {
      const key = 'met_' + kind + '_' + v;
      SPR[key] = bake(72, 72, (g) => {
        g.translate(36, 36);
        let seed = (kind.charCodeAt(0) * 131 + v * 977) >>> 0;
        const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
        const n = 11 + v * 2;
        g.beginPath();
        for (let i = 0; i < n; i++) {
          const a = i / n * Math.PI * 2;
          const rr = MET_R * (0.80 + rnd() * 0.20);
          const x = Math.cos(a) * rr, y = Math.sin(a) * rr;
          i ? g.lineTo(x, y) : g.moveTo(x, y);
        }
        g.closePath();
        g.fillStyle = P.core;
        g.fill();
        g.save();
        g.clip();
        // baked lighting: top-left key light, bottom-right shadow
        const hi = g.createRadialGradient(-12, -12, 2, -12, -12, 44);
        hi.addColorStop(0, rgba(P.lite, 0.95));
        hi.addColorStop(0.45, rgba(P.lite, 0.25));
        hi.addColorStop(1, rgba(P.lite, 0));
        g.fillStyle = hi; g.fillRect(-36, -36, 72, 72);
        const sh = g.createRadialGradient(14, 14, 4, 14, 14, 42);
        sh.addColorStop(0, rgba(P.dark, 0.85));
        sh.addColorStop(1, rgba(P.dark, 0));
        g.fillStyle = sh; g.fillRect(-36, -36, 72, 72);
        // craters — kept subtle so rock clusters don't read as faces
        for (let cIdx = 0; cIdx < 2; cIdx++) {
          const ca = rnd() * Math.PI * 2, cd = MET_R * (0.25 + rnd() * 0.35);
          const cx0 = Math.cos(ca) * cd, cy0 = Math.sin(ca) * cd;
          const cr = 3 + rnd() * 4;
          g.fillStyle = rgba(P.dark, 0.45);
          g.beginPath(); g.arc(cx0, cy0, cr, 0, Math.PI * 2); g.fill();
          g.fillStyle = rgba(P.lite, 0.22);
          g.beginPath(); g.arc(cx0 - cr * 0.3, cy0 - cr * 0.3, cr * 0.5, 0, Math.PI * 2); g.fill();
        }
        // glint
        g.fillStyle = rgba(P.glint, 0.6);
        g.beginPath(); g.arc(-MET_R * 0.35, -MET_R * 0.35, MET_R * 0.14, 0, Math.PI * 2); g.fill();
        // splitters get baked cracks so the kids learn what's coming
        if (kind === 'splitter') {
          g.strokeStyle = 'rgba(0,0,0,0.5)'; g.lineWidth = 2;
          g.beginPath();
          g.moveTo(-MET_R * 0.7, 0); g.lineTo(MET_R * 0.3, MET_R * 0.4);
          g.moveTo(-MET_R * 0.2, -MET_R * 0.6); g.lineTo(MET_R * 0.5, -MET_R * 0.2);
          g.stroke();
        }
        g.restore();
      });
      SPR[key + '_w'] = whiten(SPR[key]);
    }
    // trail — teardrop streak, drawn rotated to the velocity vector
    SPR['trail_' + kind] = bake(62, 22, (g) => {
      const lg = g.createLinearGradient(0, 11, 62, 11);
      lg.addColorStop(0, rgba(P.glow, 0));
      lg.addColorStop(0.7, rgba(P.glow, 0.4));
      lg.addColorStop(1, rgba(P.glow, 0.75));
      g.fillStyle = lg;
      g.beginPath();
      g.moveTo(0, 11);
      g.quadraticCurveTo(34, 0, 60, 6);
      g.lineTo(60, 16);
      g.quadraticCurveTo(34, 22, 0, 11);
      g.closePath(); g.fill();
    });
    // crack overlay for damaged big rocks
    if (kind === 'rock') {
      SPR.metCrack = bake(72, 72, (g) => {
        g.translate(36, 36);
        g.strokeStyle = 'rgba(0,0,0,0.6)'; g.lineWidth = 2.4; g.lineCap = 'round';
        g.beginPath();
        g.moveTo(-15, 0); g.lineTo(9, 12); g.lineTo(15, -6);
        g.moveTo(-4, -16); g.lineTo(3, -2);
        g.stroke();
      });
    }
  }

  // ── UFO (left/right variants), kamikaze, formation fighter, turret ──
  function bakeUFO(dir) {
    return bake(56, 38, (g) => {
      g.translate(28, 21);
      glowDot(g, 0, 0, 26, '#aaff60', 0.28);
      const grd = g.createLinearGradient(0, -8, 0, 9);
      grd.addColorStop(0, '#8a8a9c');
      grd.addColorStop(0.5, '#5a5a6a');
      grd.addColorStop(1, '#2e2e3c');
      g.fillStyle = grd;
      g.beginPath(); g.ellipse(0, 0, 24, 8, 0, 0, Math.PI * 2); g.fill();
      g.strokeStyle = 'rgba(0,0,0,0.6)'; g.lineWidth = 1.5;
      g.beginPath(); g.ellipse(0, 0, 24, 8, 0, 0, Math.PI * 2); g.stroke();
      glowDot(g, 0, -6, 11, '#aaff60', 0.55);
      g.fillStyle = '#aaff60';
      g.beginPath(); g.arc(0, -4, 9, Math.PI, 2 * Math.PI); g.fill();
      g.fillStyle = '#fff';
      g.beginPath(); g.arc(-2, -6, 2, 0, Math.PI * 2); g.fill();
      // hull running lights
      g.fillStyle = '#ffce4d';
      for (let i = -2; i <= 2; i++) {
        g.beginPath(); g.arc(i * 9, 4, 1.6, 0, Math.PI * 2); g.fill();
      }
      // leading-edge engine light
      glowDot(g, -dir * 26 + dir * 2, 2, 6, '#ffce4d', 0.9);
    });
  }
  SPR.ufoL = bakeUFO(1);   // moving left (vx < 0) — light on the left edge... direction handled at draw
  SPR.ufoR = bakeUFO(-1);
  SPR.ufoL_w = whiten(SPR.ufoL);
  SPR.ufoR_w = whiten(SPR.ufoR);

  for (let fIdx = 0; fIdx < 2; fIdx++) {
    SPR['kam' + fIdx] = bake(24, 30, (g) => {
      g.translate(12, 16);
      glowDot(g, 0, 0, 12, '#c45fff', 0.5);
      // thruster on top (drone flies downward)
      const flick = fIdx ? 5.5 : 3.5;
      g.fillStyle = '#ffd84d';
      g.beginPath();
      g.moveTo(-4, -8); g.lineTo(4, -8); g.lineTo(0, -8 - flick);
      g.closePath(); g.fill();
      const grd = g.createLinearGradient(-9, 0, 9, 0);
      grd.addColorStop(0, '#7a2aa8');
      grd.addColorStop(0.5, '#c45fff');
      grd.addColorStop(1, '#5a1a80');
      g.fillStyle = grd;
      g.strokeStyle = 'rgba(0,0,0,0.7)'; g.lineWidth = 1.5; g.lineJoin = 'round';
      g.beginPath();
      g.moveTo(0, 10); g.lineTo(9, -8); g.lineTo(-9, -8);
      g.closePath(); g.fill(); g.stroke();
      g.fillStyle = 'rgba(255,255,255,0.9)';
      g.beginPath(); g.arc(0, -1, 2, 0, Math.PI * 2); g.fill();
    });
  }

  // zippy formation fighter — steel dart with red trim (the "medal" enemy)
  for (let fIdx = 0; fIdx < 2; fIdx++) {
    SPR['fighter' + fIdx] = bake(26, 30, (g) => {
      g.translate(13, 16);
      // thruster (fighter flies downward-ish, flame on top)
      const flick = fIdx ? 6 : 4;
      glowDot(g, 0, -10, 6, '#7fdcff', 0.7);
      g.fillStyle = '#7fdcff';
      g.beginPath();
      g.moveTo(-3, -9); g.lineTo(3, -9); g.lineTo(0, -9 - flick);
      g.closePath(); g.fill();
      // fuselage
      const grd = g.createLinearGradient(-10, 0, 10, 0);
      grd.addColorStop(0, '#5a6a80');
      grd.addColorStop(0.5, '#9aacc4');
      grd.addColorStop(1, '#3a4658');
      g.fillStyle = grd;
      g.strokeStyle = 'rgba(0,0,0,0.7)'; g.lineWidth = 1.5; g.lineJoin = 'round';
      g.beginPath();
      g.moveTo(0, 12); g.lineTo(4, -2); g.lineTo(2, -9); g.lineTo(-2, -9); g.lineTo(-4, -2);
      g.closePath(); g.fill(); g.stroke();
      // swept wings with red tips
      g.fillStyle = '#7a8aa0';
      g.beginPath(); g.moveTo(-3, 2); g.lineTo(-12, -4); g.lineTo(-11, 2); g.closePath(); g.fill();
      g.beginPath(); g.moveTo(3, 2); g.lineTo(12, -4); g.lineTo(11, 2); g.closePath(); g.fill();
      g.fillStyle = '#ff5252';
      g.fillRect(-12.5, -4.5, 3, 3);
      g.fillRect(9.5, -4.5, 3, 3);
      // canopy
      g.fillStyle = '#ffb24d';
      g.beginPath(); g.arc(0, 3, 2.2, 0, Math.PI * 2); g.fill();
    });
    SPR['fighter' + fIdx + '_w'] = whiten(SPR['fighter' + fIdx]);
  }

  SPR.turret = bake(56, 56, (g) => {
    g.translate(28, 28);
    glowDot(g, 0, 0, 27, '#ff7a30', 0.25);
    let seed = 4242;
    const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
    g.beginPath();
    for (let i = 0; i < 12; i++) {
      const a = i / 12 * Math.PI * 2;
      const rr = 22 * (0.84 + rnd() * 0.16);
      i ? g.lineTo(Math.cos(a) * rr, Math.sin(a) * rr) : g.moveTo(22 * 0.9, 0);
    }
    g.closePath();
    g.fillStyle = '#6a4030'; g.fill();
    g.save(); g.clip();
    const hi = g.createRadialGradient(-8, -8, 2, -8, -8, 34);
    hi.addColorStop(0, 'rgba(170,110,70,0.9)');
    hi.addColorStop(1, 'rgba(170,110,70,0)');
    g.fillStyle = hi; g.fillRect(-28, -28, 56, 56);
    const sh = g.createRadialGradient(10, 10, 2, 10, 10, 30);
    sh.addColorStop(0, 'rgba(30,14,6,0.8)');
    sh.addColorStop(1, 'rgba(30,14,6,0)');
    g.fillStyle = sh; g.fillRect(-28, -28, 56, 56);
    g.fillStyle = 'rgba(58,31,12,0.9)';
    g.beginPath(); g.arc(6, 4, 6, 0, Math.PI * 2); g.fill();
    g.restore();
    // armored core ring
    g.strokeStyle = '#2a1408'; g.lineWidth = 3;
    g.beginPath(); g.arc(0, 0, 9, 0, Math.PI * 2); g.stroke();
    g.fillStyle = '#3a2010';
    g.beginPath(); g.arc(0, 0, 8, 0, Math.PI * 2); g.fill();
  });
  SPR.turret_w = whiten(SPR.turret);
  SPR.barrel = bake(38, 16, (g) => {
    g.fillStyle = '#222';
    g.fillRect(2, 4, 28, 8);

  // ── explosion sprite sheets: fireball → debris ring → smoke puff,
  //    chunky 90s-arcade style. 9 frames × 3 sizes × 6 tints. ──
  const EXPLO_FRAMES = 9;
  const EXPLO_SIZES = [36, 72, 132];           // logical diameters
  const EXPLO_TINTS = {
    orange: '#ff9944', red: '#ff5252', green: '#aaff60',
    purple: '#c45fff', ice: '#aae6ff', white: '#ffffff',
  };
  SPR.explo = {};
  for (const tname of Object.keys(EXPLO_TINTS)) {
    const col = EXPLO_TINTS[tname];
    SPR.explo[tname] = EXPLO_SIZES.map((D, tier) => {
      const frames = [];
      const CW = Math.round(D * 1.35);
      for (let f = 0; f < EXPLO_FRAMES; f++) {
        const t = f / (EXPLO_FRAMES - 1);
        frames.push(bake(CW, CW, (g) => {
          g.translate(CW / 2, CW / 2);
          const R = D / 2;
          let seed = (f * 7919 + tier * 104729 + tname.length * 31) >>> 0;
          const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
          const px = Math.max(2.5, D / 11);      // chunky "pixel" size
          const chunk = (x, y, ccol, k = 1) => {
            g.fillStyle = ccol;
            const s2 = px * k;
            g.fillRect(Math.round(x - s2 / 2), Math.round(y - s2 / 2), Math.round(s2), Math.round(s2));
          };
          if (t < 0.38) {
            // white-hot expanding fireball
            const r = R * (0.30 + t * 1.7);
            glowDot(g, 0, 0, r * 1.5, col, 0.85);
            for (let i = 0; i < 16; i++) {
              const a = rnd() * Math.PI * 2, d = rnd() * r * 0.85;
              const ramp = d / r;
              chunk(Math.cos(a) * d, Math.sin(a) * d,
                ramp < 0.35 ? '#ffffff' : ramp < 0.7 ? '#ffe9a0' : col,
                1.6 - ramp * 0.6);
            }
            glowDot(g, 0, 0, r * 0.55, '#ffffff', 0.95);
          } else if (t < 0.72) {
            // fireball breaks into a debris ring
            const r = R * (0.75 + t * 0.45);
            glowDot(g, 0, 0, r, col, 0.55 * (1 - t));
            for (let i = 0; i < 14; i++) {
              const a = (i / 14) * Math.PI * 2 + rnd() * 0.5;
              const d = r * (0.55 + rnd() * 0.45);
              const ramp = rnd();
              chunk(Math.cos(a) * d, Math.sin(a) * d,
                ramp < 0.3 ? '#ffe9a0' : ramp < 0.7 ? col : shade(col, -0.4),
                1.15 - t * 0.5);
            }
            for (let i = 0; i < 5; i++) {
              const a = rnd() * Math.PI * 2, d = rnd() * r * 0.5;
              chunk(Math.cos(a) * d, Math.sin(a) * d, 'rgba(90,60,50,0.8)', 1.5);
            }
          } else {
            // smoke puffs + last embers, fading out
            const r = R * (1.0 + t * 0.35);
            const fade = (1 - t) / 0.28;
            for (let i = 0; i < 7; i++) {
              const a = rnd() * Math.PI * 2, d = rnd() * r * 0.8;
              const sr = px * (2.2 + rnd() * 1.6);
              const sg = g.createRadialGradient(Math.cos(a) * d, Math.sin(a) * d, 0, Math.cos(a) * d, Math.sin(a) * d, sr);
              sg.addColorStop(0, `rgba(110,95,90,${0.5 * fade})`);
              sg.addColorStop(1, 'rgba(110,95,90,0)');
              g.fillStyle = sg;
              g.fillRect(Math.cos(a) * d - sr, Math.sin(a) * d - sr, sr * 2, sr * 2);
            }
            for (let i = 0; i < 4; i++) {
              const a = rnd() * Math.PI * 2, d = r * (0.7 + rnd() * 0.3);
              chunk(Math.cos(a) * d, Math.sin(a) * d, rgba(col, 0.7 * fade), 0.8);
            }
          }
        }, 1.5));
      }
      return frames;
    });
  }

  // ═══════════════════════════════════════════════════════════════════════
  // PARALLAX WORLD — three tall pre-rendered tile canvases (deep starfield,
  // mid asteroid drift, near set-pieces), each drawn with 2 wrapped
  // drawImage calls. Raiden flies over territory; we fly over deep space.
  // ═══════════════════════════════════════════════════════════════════════
  const BG = {};
  (function bakeBackground() {
    // Layer 1 — deep starfield + faint nebulae (opaque base)
    BG.far = bake(VW, 900, (g, w, h) => {
      g.fillStyle = '#04040f';
      g.fillRect(0, 0, w, h);
      let seed = 1234567;
      const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
      // nebula wisps
      const nebs = [
        [140, 180, 170, '#1c1440'], [620, 520, 210, '#0e2038'],
        [380, 780, 150, '#241028'], [700, 120, 130, '#101c3c'],
      ];
      for (const [nx, ny, nr, ncol] of nebs) {
        const gr = g.createRadialGradient(nx, ny, 8, nx, ny, nr);
        gr.addColorStop(0, rgba(ncol, 0.55));
        gr.addColorStop(1, rgba(ncol, 0));
        g.fillStyle = gr;
        g.fillRect(nx - nr, ny - nr, nr * 2, nr * 2);
        // wrap copy near the seam so the tile tiles cleanly
        if (ny < nr) { g.fillStyle = gr; }
      }
      // stars — plain rects, no seam issues (kept away from the very edge)
      for (let i = 0; i < 150; i++) {
        const x = rnd() * w, y = 4 + rnd() * (h - 8);
        const s2 = rnd() < 0.85 ? 1.2 : 2.2;
        const tintR = rnd();
        g.fillStyle = tintR < 0.12 ? `rgba(255,214,170,${0.3 + rnd() * 0.6})`
                    : tintR < 0.24 ? `rgba(170,200,255,${0.3 + rnd() * 0.6})`
                    : `rgba(255,255,255,${0.25 + rnd() * 0.65})`;
        g.fillRect(x, y, s2, s2);
      }
      // a couple of bright cross-twinkle stars
      for (let i = 0; i < 5; i++) {
        const x = 30 + rnd() * (w - 60), y = 30 + rnd() * (h - 60);
        glowDot(g, x, y, 6, '#ffffff', 0.8);
        g.fillStyle = 'rgba(255,255,255,0.9)';
        g.fillRect(x - 3.5, y - 0.5, 7, 1);
        g.fillRect(x - 0.5, y - 3.5, 1, 7);
      }
    }, 1);

    // Layer 2 — mid asteroid-silhouette drift
    BG.mid = bake(VW, 1100, (g, w, h) => {
      let seed = 987654;
      const rnd = () => (seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296;
      for (let i = 0; i < 16; i++) {
        const x = rnd() * w, y = 40 + rnd() * (h - 80);
        const r = 14 + rnd() * 46;
        const n = 9 + (rnd() * 4 | 0);
        g.beginPath();
        for (let k = 0; k < n; k++) {
          const a = k / n * Math.PI * 2;
          const rr = r * (0.78 + rnd() * 0.22);
          k ? g.lineTo(x + Math.cos(a) * rr, y + Math.sin(a) * rr)
            : g.moveTo(x + r * 0.8, y);
        }
        g.closePath();
        g.fillStyle = 'rgba(16,16,30,0.92)';
        g.fill();
        // faint top rim so it reads as a rock, not a hole
        g.save(); g.clip();
        const rim = g.createLinearGradient(x, y - r, x, y + r * 0.2);
        rim.addColorStop(0, 'rgba(70,70,110,0.5)');
        rim.addColorStop(1, 'rgba(70,70,110,0)');
        g.fillStyle = rim;
        g.fillRect(x - r, y - r, r * 2, r * 1.4);
        g.restore();
      }
      // a few mid-layer stars for depth
      for (let i = 0; i < 40; i++) {
        g.fillStyle = `rgba(230,238,255,${0.25 + rnd() * 0.5})`;
        g.fillRect(rnd() * w, 6 + rnd() * (h - 12), 1.6, 1.6);
      }
    }, 1);

    // Layer 3 — near set-pieces: derelict station, planetoid edge, tech
    // debris. Dark silhouettes with rim lighting so they read as backdrop.
    BG.near = bake(VW, 1700, (g, w, h) => {
      const SIL = '#0a0a16', RIM = 'rgba(95,190,220,0.55)', RIM2 = 'rgba(255,150,80,0.4)';
      // — derelict ring station (y ≈ 260) —
      g.save();
      g.translate(600, 260);
      g.rotate(0.35);
      g.strokeStyle = SIL; g.lineWidth = 26;
      g.beginPath(); g.arc(0, 0, 78, 0.4, Math.PI * 1.7); g.stroke();
      g.strokeStyle = RIM; g.lineWidth = 2.5;
      g.beginPath(); g.arc(0, 0, 91, 0.5, Math.PI * 0.9); g.stroke();
      g.fillStyle = SIL;
      g.fillRect(-14, -110, 28, 220);          // spine
      g.fillRect(-46, -20, 92, 40);            // hub
      g.fillStyle = RIM;
      g.fillRect(-46, -20, 92, 2);             // lit hub edge
      // dead portholes + two still-lit ones
      g.fillStyle = 'rgba(40,50,70,0.8)';
      for (let i = 0; i < 5; i++) g.fillRect(-38 + i * 17, -6, 5, 5);
      g.fillStyle = 'rgba(255,230,150,0.75)';
      g.fillRect(-38 + 1 * 17, -6, 5, 5);
      g.fillRect(-38 + 3 * 17, -6, 5, 5);
      g.restore();

      // — planetoid edge poking in from the left (y ≈ 700) —
      g.save();
      g.translate(-160, 700);
      g.fillStyle = '#0c0a14';
      g.beginPath(); g.arc(0, 0, 300, 0, Math.PI * 2); g.fill();
      // thin concentric rim light on the sunward edge only
      const prim = g.createRadialGradient(0, 0, 270, 0, 0, 300);
      prim.addColorStop(0, 'rgba(190,120,200,0)');
      prim.addColorStop(0.85, 'rgba(190,120,200,0)');
      prim.addColorStop(1, 'rgba(190,120,200,0.4)');
      g.fillStyle = prim;
      g.beginPath(); g.arc(0, 0, 300, 0, Math.PI * 2); g.fill();
      g.fillStyle = 'rgba(10,8,18,0.9)';
      g.beginPath(); g.arc(160, -90, 40, 0, Math.PI * 2); g.fill();
      g.beginPath(); g.arc(120, 60, 26, 0, Math.PI * 2); g.fill();
      g.restore();

      // — tech debris cluster (y ≈ 1080) —
      g.save();
      g.translate(560, 1080);
      g.rotate(-0.25);
      g.fillStyle = SIL;
      g.fillRect(-70, -12, 140, 24);           // broken truss
      g.fillRect(-18, -46, 36, 34);
      g.fillStyle = RIM2;
      g.fillRect(-70, -12, 140, 2);
      g.fillStyle = SIL;
      g.beginPath(); g.moveTo(80, -6); g.lineTo(150, -34); g.lineTo(142, 8); g.closePath(); g.fill();
      g.strokeStyle = RIM2; g.lineWidth = 2;
      g.beginPath(); g.moveTo(80, -6); g.lineTo(150, -34); g.stroke();
      // sparking light
      glowDot(g, -18, -46, 8, '#ffb24d', 0.7);
      g.restore();

      // — wrecked hulk drifting on the right (y ≈ 1440) —
      g.save();
      g.translate(690, 1440);
      g.rotate(0.5);
      g.fillStyle = SIL;
      g.beginPath();
      g.moveTo(-90, 0); g.lineTo(-30, -26); g.lineTo(70, -18); g.lineTo(90, 6); g.lineTo(20, 24); g.lineTo(-60, 18);
      g.closePath(); g.fill();
      g.strokeStyle = RIM; g.lineWidth = 2;
      g.beginPath(); g.moveTo(-90, 0); g.lineTo(-30, -26); g.lineTo(70, -18); g.stroke();
      g.fillStyle = 'rgba(255,230,150,0.5)';
      g.fillRect(-20, -8, 4, 4);
      g.fillRect(30, -4, 4, 4);
      g.restore();
    }, 1);
  })();

  // master scroll accumulator — speed ties subtly to wave intensity
  let bgScroll = 0;
  function bgSpeedK() {
    if (state === MENU) return 0.35;
    if (state === DEAD || state === VICTORY) return 0.45;
    const boss = (zorg || miniBoss) ? 0.35 : 0;
    return 0.75 + Math.min(0.75, wave * 0.09) + boss;
  }
  function tileLayer(s, k) {
    const h = s.h;
    const y = ((bgScroll * k) % h + h) % h;
    ctx.drawImage(s.c, 0, y - h, VW, h);
    ctx.drawImage(s.c, 0, y, VW, h);
  }
  function drawParallax() {
    tileLayer(BG.far, 0.22);
    tileLayer(BG.mid, 0.55);
    tileLayer(BG.near, 1.25);
  }

  // ───── game state ─────
  const MENU = 'menu', PLAYING = 'playing', WAVE_BANNER = 'wave', BOSS = 'boss', PAUSED = 'paused', DEAD = 'dead', VICTORY = 'victory';
  let state = MENU;

  let pilotId = 'ben';        // P1 pilot (menu cursor)
  let p2PilotId = 'luke';     // P2 pilot (menu cursor)
  let p2Joined = false;       // P2 is part of the session (menu join or mid-game drop-in)
  let menuP1Ready = false, menuP2Ready = false;
  // 1-2 player local co-op: players[0] = P1 (pad 0 + keyboard + touch),
  // players[1] = P2 (pad 1 only). Score/combo stay shared (team spirit);
  // lives, bombs, buffs and wingmen live on each player.
  let players = [];
  // Initialize collections at declaration so the render loop is safe to call
  // before resetGame() runs (the title screen draws stars/planets while the
  // user is choosing a pilot, and would otherwise iterate over undefined).
  let bullets = [], enemyBullets = [], meteors = [], ufos = [];
  let kamikazes = [], turrets = [], bgComets = [];
  let powerups = [], floatingTexts = [];
  let fighters = [], formations = [];
  let zorg = null, miniBoss = null;
  // Full-screen white flash frames (bomb detonation)
  let bombFlashT = 0;

  // ── pooled explosions & particles — fixed-size ring buffers so the hot
  //    loops never allocate. Draw path is drawImage-only sprite frames. ──
  const EXPLO_MAX = 24, PART_MAX = 72;
  const explosions = [];
  for (let i = 0; i < EXPLO_MAX; i++) explosions.push({ active: false, x: 0, y: 0, tint: 'orange', tier: 0, k: 1, f: 0, tick: 0 });
  let _exI = 0;
  const particles = [];
  for (let i = 0; i < PART_MAX; i++) particles.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 1, size: 2, spr: null });
  let _paI = 0;

  // Map the old explosion colours onto the baked sheet tints.
  function exploTint(color) {
    switch (color) {
      case '#fff': case '#ffffff': return 'white';
      case '#aae6ff': case '#7fdcff': return 'ice';
      case '#c45fff': return 'purple';
      case '#aaff60': case '#5dd66c': return 'green';
      case '#ff5252': return 'red';
      default: return 'orange';
    }
  }
  // The one true explosion spawner — everything booms through here.
  function boom(x, y, radius, color) {
    const e = explosions[_exI];
    _exI = (_exI + 1) % EXPLO_MAX;
    const tier = radius < 45 ? 0 : radius < 92 ? 1 : 2;
    e.active = true;
    e.x = x; e.y = y;
    e.tint = exploTint(color || '#ff9944');
    e.tier = tier;
    e.k = Math.max(0.6, Math.min(1.7, (radius * 2) / (EXPLO_SIZES[tier] * 1.35)));
    e.f = 0; e.tick = 0;
  }
  let wave = 0, score = 0, scoreFlash = 0;
  let waveTimer = 0, waveSpawnAcc = 0, waveSpawnInterval = 60, meteorsThisWave = 0, meteorsRemaining = 0;
  let kamikazeAcc = 0, turretAcc = 0, formAcc = 0;
  let bannerText = '', bannerSub = '', bannerTime = 0;
  let shake = 0;
  // Combo / scoring system. Every kill inside COMBO_WINDOW frames stacks
  // the multiplier; SpeechSynthesis calls out milestones.
  let combo = 0, comboTimer = 0, maxCombo = 0;
  const COMBO_WINDOW = 110;
  // Active set-piece events
  let meteorShowerT = 0;
  let damageThisWave = 0;
  // Frame-level slow-mo multiplier (0..1). 1 = normal. Set by SLOW-MO power-up.
  let enemySpeed = 1;
  // Hit-pause: skip enemy updates for a few frames on a big kill — adds weight.
  let hitPauseT = 0;
  const TOTAL_WAVES = 7;
  const MIDBOSS_WAVE = 4;

  function freshPlayer(idx, pid) {
    const f = PILOTS[pid];
    return {
      idx,                 // 0 = P1, 1 = P2
      pilotId: pid,
      shipColor: idx === 1 ? tintToCyan(f.color, 0.45) : f.color,
      boltColor: idx === 1 ? tintToCyan(f.boltColor, 0.45) : f.boltColor,
      x: VW / 2,
      y: VH - 60,
      r: 16,
      vx: 0, vy: 0,
      cooldown: 0,
      // Raiden-style weapon system: red pickup = VULCAN (spread bolts),
      // blue pickup = LASER beam (held continuous). Same colour levels up
      // (1-4), other colour switches weapon but keeps the level.
      weapon: 'vulcan',
      wlevel: 1,
      beamOn: false,       // beam weapon firing this frame (FIRE held)
      beamHeat: 0,         // beam tick counter (damage cadence + sfx)
      muzzle: 0,           // muzzle-flash frames left
      shieldTime: 0,
      homingTime: 0,       // "M" missiles — bolts curve toward enemies
      magnetTime: 0,       // power-up crates fly toward you
      slowTime: 0,         // bullet-time on enemies
      wingmenTime: 0,      // two escort ships co-fire
      invuln: 0,           // post-respawn invulnerability frames
      flash: 0,
      thruster: 0,
      lives: 3,
      bombs: 4,
      alive: true,         // false while respawning or out of lives
      respawnT: 0,         // frames until respawn while the other player fights on
      wingmen: [],         // per-player escort ships
    };
  }

  // Home column for (re)spawn — side by side in co-op, centred solo.
  function homeX(p) {
    return players.length === 2 ? (p.idx === 0 ? VW / 2 - 80 : VW / 2 + 80) : VW / 2;
  }

  function resetGame() {
    players = [freshPlayer(0, pilotId)];
    if (p2Joined) players.push(freshPlayer(1, p2PilotId));
    for (const p of players) p.x = homeX(p);
    bullets = []; enemyBullets = []; meteors = []; ufos = [];
    kamikazes = []; turrets = []; bgComets = [];
    powerups = []; floatingTexts = [];
    fighters = []; formations = [];
    for (const e of explosions) e.active = false;
    for (const pt of particles) pt.active = false;
    bombFlashT = 0;
    zorg = null; miniBoss = null;
    wave = 0;
    score = 0;
    scoreFlash = 0;
    shake = 0;
    combo = 0; comboTimer = 0; maxCombo = 0;
    meteorShowerT = 0;
    damageThisWave = 0;
    enemySpeed = 1;
    hitPauseT = 0;
  }

  // ───── waves ─────
  // Difficulty ramps from soft into chaos. New enemy types unlock per wave
  // so the family sees something new every round. Wave 4 is the Mothership
  // mini-boss, wave 7 is ZORG.
  // formEvery: cadence of choreographed fighter formations (same time base
  // as kamikazeEvery) — they add Raiden texture, not bullet-hell density.
  const WAVES = [
    // 1: meteor basics
    { count: 14, interval: 58, ufoEvery: 0,  iceChance: 0.0,  bigChance: 0.0,  meteorVy: 1.6, kamikazeEvery: 0,  turretEvery: 0,  formEvery: 0,  splitterChance: 0.0,  showerChance: 0.0,  desc: 'METEOR FIELD' },
    // 2: + ice + occasional splitter + first fighter formations
    { count: 18, interval: 52, ufoEvery: 0,  iceChance: 0.15, bigChance: 0.05, meteorVy: 1.8, kamikazeEvery: 0,  turretEvery: 0,  formEvery: 11, splitterChance: 0.10, showerChance: 0.0,  desc: 'ICE STORM' },
    // 3: + UFOs + first kamikaze swarm
    { count: 22, interval: 46, ufoEvery: 8,  iceChance: 0.18, bigChance: 0.10, meteorVy: 2.0, kamikazeEvery: 16, turretEvery: 0,  formEvery: 10, splitterChance: 0.15, showerChance: 0.003, desc: 'ENEMY CONTACT' },
    // 4: MOTHERSHIP mini-boss
    { boss: 'mini', desc: 'MOTHERSHIP' },
    // 5: + turret asteroids
    { count: 24, interval: 42, ufoEvery: 7,  iceChance: 0.20, bigChance: 0.14, meteorVy: 2.1, kamikazeEvery: 13, turretEvery: 18, formEvery: 9,  splitterChance: 0.20, showerChance: 0.004, desc: 'GUN BELT' },
    // 6: everything mixed, faster
    { count: 30, interval: 36, ufoEvery: 6,  iceChance: 0.25, bigChance: 0.18, meteorVy: 2.3, kamikazeEvery: 10, turretEvery: 14, formEvery: 7,  splitterChance: 0.22, showerChance: 0.005, desc: 'CHAOS' },
    // 7: ZORG
    { boss: 'zorg', desc: 'ZORG' },
  ];

  function startWave(n) {
    // Wave-clear gift: free bomb every wave you survive (caps at 9), so kids
    // can always count on having one on hand for the mothership / Zorg.
    if (n > 1) {
      for (const p of players) if (p.lives > 0) p.bombs = Math.min(9, p.bombs + 1);
      syncBombBtn();
      floatingTexts.push({
        x: VW / 2, y: VH / 2 + 30, vy: -0.5, time: 60,
        text: '+ BOMB',
        color: '#ffb24d', size: 18,
      });
    }
    // Perfect-wave bonus — only after a non-banner wave that the player
    // actually played through unharmed.
    if (n > 1 && n - 1 <= WAVES.length && !WAVES[n - 2].boss && damageThisWave === 0) {
      addPoints(500, VW / 2, VH / 2, 'PERFECT! +500');
      try {
        if ('speechSynthesis' in window) {
          const u = new SpeechSynthesisUtterance('Perfect!');
          u.pitch = 1.4; u.rate = 1.1; u.volume = 0.9;
          window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
        }
      } catch {}
    }
    damageThisWave = 0;

    wave = n;
    if (n > TOTAL_WAVES) { winGame(); return; }
    const def = WAVES[n - 1];
    if (def.boss === 'mini') {
      spawnMothership();
      bannerText = 'WARNING';
      bannerSub  = 'MOTHERSHIP DETECTED';
      bannerTime = 120;
      state = WAVE_BANNER;
      sfx.bossAppear();
      return;
    }
    if (def.boss === 'zorg') {
      spawnZorg();
      bannerText = 'WARNING';
      bannerSub  = 'ZORG APPROACHES';
      bannerTime = 130;
      state = WAVE_BANNER;
      sfx.bossAppear();
      return;
    }
    meteorsThisWave = def.count;
    meteorsRemaining = def.count;
    waveSpawnInterval = def.interval;
    waveSpawnAcc = 0;
    kamikazeAcc = 0; turretAcc = 0; formAcc = 0;
    waveTimer = 0;
    bannerText = 'WAVE ' + n;
    bannerSub  = def.desc || 'INCOMING';
    bannerTime = 90;
    state = WAVE_BANNER;
    sfx.waveStart();
  }

  function spawnMeteor(opts = {}) {
    const def = WAVES[wave - 1] || { iceChance: 0.1, bigChance: 0.05, meteorVy: 2.0, splitterChance: 0 };
    // Fragments (from a splitter) are always plain small fast rocks — they
    // shouldn't randomly upgrade to ice/big/splitter again.
    const fragment = !!opts.fragment;
    const isIce      = !fragment && (opts.kind === 'ice' || (opts.kind == null && Math.random() < (def.iceChance || 0)));
    const isBig      = !fragment && !isIce && (opts.big || (opts.kind == null && Math.random() < (def.bigChance || 0)));
    const isSplitter = !fragment && !isIce && !isBig && Math.random() < (def.splitterChance || 0);
    const r = opts.r ?? (isBig ? 30 + Math.random() * 8 : (fragment ? 10 + Math.random() * 3 : 16 + Math.random() * 8));
    const x = opts.x ?? (30 + Math.random() * (VW - 60));
    const y = opts.y ?? -40;
    const vx = opts.vx ?? (Math.random() - 0.5) * 1.2;
    const vy = opts.vy ?? def.meteorVy + Math.random() * 0.8;
    const hp = isBig ? 3 : 1;
    meteors.push({
      x, y, vx, vy, r,
      hp, maxHp: hp,
      kind: isSplitter ? 'splitter' : (isIce ? 'ice' : 'rock'),
      spin: Math.random() * Math.PI * 2,
      spinV: (Math.random() - 0.5) * 0.05,
      big: isBig,
      splitter: isSplitter,
      fragment,
      v: (Math.random() * 3) | 0,   // baked rock variant
      hitFlash: 0,
    });
  }

  function spawnKamikaze(opts = {}) {
    kamikazes.push({
      x: opts.x ?? 50 + Math.random() * (VW - 100),
      y: opts.y ?? -30,
      vx: opts.vx ?? (Math.random() - 0.5) * 0.6,
      vy: opts.vy ?? 2.4 + Math.random() * 0.8,
      r: 11,
      hp: 1, maxHp: 1,
      thruster: 0,
    });
  }

  function spawnTurret() {
    turrets.push({
      x: 80 + Math.random() * (VW - 160),
      y: -40,
      vy: 1.4,
      r: 22,
      hp: 4, maxHp: 4,
      phase: 'falling',
      dockY: 90 + Math.random() * 90,
      cooldown: 70 + Math.random() * 50,
      spin: 0,
      hitFlash: 0,
    });
  }

  // ── choreographed fighter formations (the Raiden "medal" moment) ──
  // Small zippy fighters enter in V-wedges, sine-snakes or arc sweeps.
  // Destroy the WHOLE formation before any escape → weapon pickup drops.
  const FORM_TYPES = ['vee', 'snake', 'sweep'];
  function spawnFormation(kindOverride) {
    const kind = kindOverride || FORM_TYPES[(Math.random() * FORM_TYPES.length) | 0];
    const size = kind === 'vee' ? 5 : 4 + ((Math.random() * 3) | 0);   // 4-6 ships
    const form = { total: size, killed: 0, escaped: 0, bombed: false, dropX: VW / 2, dropY: 120 };
    formations.push(form);
    const dir = Math.random() < 0.5 ? 1 : -1;
    const x0 = 140 + Math.random() * (VW - 280);
    const yBase = 50 + Math.random() * 110;
    for (let i = 0; i < size; i++) {
      fighters.push({
        x: -999, y: -999,
        r: 10, hp: 1,
        t: kind === 'vee' ? 0 : -i * 16,   // trains stagger, wedges fly as one
        i, kind, dir, x0, yBase,
        form,
        hitFlash: 0, thr: 0, shot: false,
      });
    }
    sfx.warn();
  }
  // Parametric path — no allocations; writes into a shared scratch point.
  const _fp = { x: 0, y: 0 };
  function fighterPos(f, t) {
    if (t < 0) { _fp.x = -999; _fp.y = -999; return; }
    if (f.kind === 'vee') {
      const c = (f.form.total - 1) / 2;
      _fp.x = f.x0 + (f.i - c) * 36 + Math.sin(t * 0.02) * 26 * f.dir;
      _fp.y = -30 + t * 2.1 + Math.abs(f.i - c) * 28;
    } else if (f.kind === 'snake') {
      _fp.x = f.dir > 0 ? -30 + t * 2.9 : VW + 30 - t * 2.9;
      _fp.y = f.yBase + Math.sin(t * 0.045 + f.i * 0.9) * 70 + t * 0.30;
    } else {  // sweep — arc across the screen, dipping toward the players
      _fp.x = f.dir > 0 ? -36 + t * 2.6 : VW + 36 - t * 2.6;
      const px = Math.max(0, Math.min(VW, _fp.x));
      _fp.y = 26 + Math.sin(px / VW * Math.PI) * 230;
    }
  }

  function spawnMothership() {
    miniBoss = {
      x: VW / 2,
      y: -60,
      tx: VW / 2,
      ty: 90,
      r: 36,
      hp: 18, maxHp: 18,        // softer than before — was 28
      phase: 'entering',
      moveT: 0,
      dropCooldown: 260,        // first pod takes longer — was 160
      shootCooldown: 150,       // longer warm-up — was 110
      flash: 0,
      moveX: 1,
      halfHpDrop: false,        // drops a care package at 50%
    };
  }

  function spawnUFO() {
    const fromLeft = Math.random() < 0.5;
    ufos.push({
      x: fromLeft ? -30 : VW + 30,
      y: 50 + Math.random() * 80,
      vx: fromLeft ? 1.6 : -1.6,
      vy: 0,
      r: 16,
      hp: 2, maxHp: 2,
      shootCooldown: 70 + Math.random() * 40,
      hitFlash: 0,
    });
  }

  function spawnZorg() {
    zorg = {
      x: VW / 2,
      y: -80,
      tx: VW / 2,
      ty: 90,
      r: 44,
      hp: 100, maxHp: 100,
      phase: 'entering',
      shootCooldown: 90,
      meteorCooldown: 220,
      moveT: 0,
      flash: 0,
    };
  }

  function spawnPowerup(x, y, kindOverride) {
    // Raiden-style crates: red V (vulcan) and blue L (laser beam) drive the
    // weapon-level system, M stacks homing missiles on either weapon. Bombs
    // and shield get bumped weight so kids stay topped up; support items
    // (magnet / slow-mo / wingmen) are rarer reward moments. Life is rare.
    const pool = [
      ['vulcan',  16],
      ['beam',    12],
      ['bomb',    17],
      ['shield',  13],
      ['homing',   9],
      ['wingmen',  6],
      ['magnet',   6],
      ['slowmo',   5],
      ['life',     4],
    ];
    let kind = kindOverride;
    if (!kind) {
      let total = 0; for (const [, w] of pool) total += w;
      let r = Math.random() * total;
      kind = 'rapid';
      for (const [k, w] of pool) { r -= w; if (r <= 0) { kind = k; break; } }
    }
    powerups.push({ x, y, vx: 0, vy: 1.2, r: 12, rotation: 0, kind });
  }

  // VULCAN fire — levels 1-4 add streams and width. (The beam weapon is a
  // held continuous laser handled by updateBeam; it never fires bullets.)
  function playerFire(p) {
    if (p.weapon === 'beam') return;
    if (p.cooldown > 0) return;
    p.cooldown = 12 - p.wlevel;          // 11 / 10 / 9 / 8
    p.muzzle = 3;
    const pc = p.boltColor;
    const fx = p.x, fy = p.y - 16;
    const homing = p.homingTime > 0;
    const mk = (x, vx, vy) => bullets.push({ x, y: fy, vx, vy, r: 4, color: pc, life: homing ? 90 : 60, homing });
    const lv = p.wlevel;
    if (lv === 1) {
      mk(fx, 0, -10);
    } else if (lv === 2) {
      mk(fx - 7, 0, -10); mk(fx + 7, 0, -10);
    } else if (lv === 3) {
      mk(fx - 7, 0, -10); mk(fx + 7, 0, -10);
      mk(fx - 12, Math.sin(-0.20) * 9.4, Math.cos(-0.20) * -9.4);
      mk(fx + 12, Math.sin(0.20) * 9.4, Math.cos(0.20) * -9.4);
    } else {
      mk(fx, 0, -10.5);
      mk(fx - 8, 0, -10); mk(fx + 8, 0, -10);
      mk(fx - 13, Math.sin(-0.33) * 9.4, Math.cos(-0.33) * -9.4);
      mk(fx + 13, Math.sin(0.33) * 9.4, Math.cos(0.33) * -9.4);
    }
    // Wingmen co-fire — each wingman has its own cooldown counter.
    for (const w of p.wingmen) {
      if (w.cooldown <= 0) {
        const wx = p.x + w.offsetX, wy = p.y + w.offsetY - 12;
        bullets.push({ x: wx, y: wy, vx: 0, vy: -9, r: 3, color: '#ffe066', life: 60, homing: false });
        w.cooldown = 14;
      }
    }
    sfx.shot();
  }

  function detonateBomb(p) {
    if (!p || !p.alive || p.bombs <= 0) return;
    p.bombs--;
    syncBombBtn();
    sfx.bomb();
    shake = Math.max(shake, 20);
    // Big white flash + clear all enemies + chip both bosses
    bombFlashT = 22;
    boom(VW / 2, VH / 2, 140, '#fff');
    for (const m of meteors) {
      boom(m.x, m.y, m.r * 2.5, m.kind === 'ice' ? '#aae6ff' : '#ffa050');
      addPoints(m.big ? 30 : 15, m.x, m.y, m.big ? '+30' : '+15');
      spawnDebris(m.x, m.y, m.kind === 'ice' ? '#aae6ff' : '#ff8040', 12);
    }
    meteors.length = 0;
    for (const u of ufos) {
      boom(u.x, u.y, 40, '#aaff60');
      addPoints(80, u.x, u.y, '+80');
      spawnDebris(u.x, u.y, '#aaff60', 14);
    }
    ufos.length = 0;
    for (const k of kamikazes) {
      boom(k.x, k.y, 28, '#c45fff');
      addPoints(40, k.x, k.y, '+40');
      spawnDebris(k.x, k.y, '#c45fff', 8);
    }
    kamikazes.length = 0;
    for (const t of turrets) {
      boom(t.x, t.y, 40, '#ff7a30');
      addPoints(120, t.x, t.y, '+120');
      spawnDebris(t.x, t.y, '#ff7a30', 14);
    }
    turrets.length = 0;
    for (const f of fighters) {
      boom(f.x, f.y, 26, '#ff9944');
      addPoints(60, f.x, f.y, '+60');
      spawnDebris(f.x, f.y, '#9aacc4', 6);
      f.form.killed++;
      f.form.bombed = true;   // bomb clears don't earn the formation medal
      f.form.dropX = f.x; f.form.dropY = f.y;
    }
    fighters.length = 0;
    enemyBullets.length = 0;
    if (miniBoss && miniBoss.phase === 'fight') {
      miniBoss.hp = Math.max(0, miniBoss.hp - 6);
      miniBoss.flash = 12;
      if (miniBoss.hp <= 0) startMiniBossDeath();
    }
    if (zorg && zorg.phase !== 'dying') {
      zorg.hp = Math.max(0, zorg.hp - 14);
      zorg.flash = 14;
    }
  }

  // Combo multiplier — every kill inside COMBO_WINDOW frames stacks. The
  // multiplier steps up every 3 hits (1x, 2x, 3x, …) capped at 8x. Score
  // popups get progressively flashier colours; SpeechSynthesis announces
  // milestone tiers so it feels like an arcade crowd cheering you on.
  const COMBO_TIERS = [
    { at: 6,  label: 'DOUBLE!',  color: '#ffe066' },
    { at: 10, label: 'TRIPLE!',  color: '#ffce4d' },
    { at: 15, label: 'RAMPAGE!', color: '#ff80b3' },
    { at: 20, label: 'INSANE!',  color: '#ff5252' },
    { at: 30, label: 'GODLIKE!', color: '#c45fff' },
  ];
  let lastComboTier = 0;
  function comboMult() { return Math.min(8, Math.max(1, Math.floor(combo / 3) + 1)); }
  function comboColor() {
    const m = comboMult();
    return m >= 6 ? '#c45fff' : m >= 4 ? '#ff5252' : m >= 3 ? '#ff80b3' : m >= 2 ? '#ffce4d' : '#ffe066';
  }
  function addPoints(p, x, y, label) {
    if (state === PLAYING && p > 0) {
      combo++;
      comboTimer = COMBO_WINDOW;
      if (combo > maxCombo) maxCombo = combo;
    }
    const mult = comboMult();
    const total = Math.floor(p * mult);
    score += total;
    scoreFlash = 14;
    if (x != null) floatingTexts.push({
      x, y: y - 14, vy: -0.8, time: 50,
      text: label || ('+' + total),
      color: comboColor(),
      size: 14 + Math.min(8, mult * 1.2),
    });
    // Milestone announce — speak once per tier per combo run
    for (const t of COMBO_TIERS) {
      if (combo === t.at && lastComboTier < t.at) {
        lastComboTier = t.at;
        floatingTexts.push({ x: VW / 2, y: 80, vy: -0.6, time: 70, text: t.label, color: t.color, size: 26 });
        try {
          if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance(t.label.replace('!', ''));
            u.pitch = 1.2; u.rate = 1.05; u.volume = 0.9;
            window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
          }
        } catch {}
        break;
      }
    }
  }
  function resetCombo() { combo = 0; comboTimer = 0; lastComboTier = 0; }

  // Pooled debris — ring buffer, tiny pre-baked glow-dot sprites, no
  // allocation. Counts are halved vs the old vector particles because each
  // one is now a drawImage in the frame budget.
  function spawnDebris(x, y, color, count = 8) {
    const n = Math.max(1, count >> 1);
    const spr = dotSpr(color);
    for (let i = 0; i < n; i++) {
      const pt = particles[_paI];
      _paI = (_paI + 1) % PART_MAX;
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 3;
      pt.active = true;
      pt.x = x; pt.y = y;
      pt.vx = Math.cos(a) * sp;
      pt.vy = Math.sin(a) * sp;
      pt.life = 30 + Math.random() * 20;
      pt.maxLife = 50;
      pt.size = 2 + Math.random() * 2.5;
      pt.spr = spr;
    }
  }

  function killPlayer(p) {
    if (!p || !p.alive || p.invuln > 0 || p.shieldTime > 0) return;
    if (state !== PLAYING && state !== WAVE_BANNER) return;
    boom(p.x, p.y, 70, '#fff');
    spawnDebris(p.x, p.y, p.shipColor, 24);
    sfx.death();
    shake = Math.max(shake, 18);
    damageThisWave++;
    resetCombo();
    // strip timed buffs + wingmen — they die with the ship; the weapon
    // drops one level (Raiden-kind, not Raiden-cruel)
    p.wingmen.length = 0;
    p.wlevel = Math.max(1, p.wlevel - 1);
    p.beamOn = false;
    p.beamHeat = 0;
    p.muzzle = 0;
    p.shieldTime = 0;
    p.homingTime = 0;
    p.magnetTime = 0;
    p.slowTime = 0;
    p.wingmenTime = 0;
    p.vx = 0; p.vy = 0;
    p.lives--;
    p.alive = false;
    if (p.lives <= 0) {
      // Out of lives. The full dramatic game-over only plays when EVERY
      // joined player is out — otherwise the survivor keeps the run alive.
      let allOut = true;
      for (const q of players) if (q.lives > 0) { allOut = false; break; }
      if (allOut) {
        state = DEAD;
        setTimeout(showGameOver, 1200);
      } else {
        floatingTexts.push({
          x: p.x, y: p.y - 20, vy: -0.5, time: 90,
          text: (p.idx === 1 ? 'P2' : 'P1') + ' DOWN!',
          color: '#ff5252', size: 20,
        });
      }
      return;
    }
    // Respawn after 1.5 s (90 frames) while the other player keeps playing;
    // updatePlayers() re-enters the ship with a 2.5 s invulnerability blink.
    p.respawnT = 90;
  }

  // ───── input ─────
  const keys = {};
  const touchInput = { up:false, down:false, left:false, right:false, fire:false };
  window.addEventListener('keydown', (e) => {
    if (state === MENU) return;
    keys[e.key.toLowerCase()] = true;
    // Space = fire (held re-fires at the cooldown rate). B = bomb (edge-
    // triggered, ignore key auto-repeat).
    if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); }
    if ((e.key === 'b' || e.key === 'B') && !e.repeat) { if (state === PLAYING) detonateBomb(players[0]); }
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') togglePause();
  });
  window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

  // D-pad + action buttons — same touchstart/end pattern as Phaser Wars.
  // D-pad and FIRE are held-state. BOMB fires on press only (edge-triggered).
  document.querySelectorAll('.btn').forEach(btn => {
    const act = btn.dataset.act;
    if (!act) return;
    const set = (v) => {
      if (act === 'bomb') {
        if (v && (state === PLAYING || state === WAVE_BANNER)) {
          ensureAudio();
          detonateBomb(players[0]); // touch bomb button stays P1
        }
        btn.classList.toggle('held', v);
      } else {
        touchInput[act] = v;
        btn.classList.toggle('held', v);
      }
    };
    const down = (e) => { e.preventDefault(); ensureAudio(); set(true); };
    const up   = (e) => { e.preventDefault(); set(false); };
    btn.addEventListener('touchstart',  down, { passive:false });
    btn.addEventListener('touchend',    up,   { passive:false });
    btn.addEventListener('touchcancel', up,   { passive:false });
    btn.addEventListener('mousedown',   down);
    btn.addEventListener('mouseup',     up);
    btn.addEventListener('mouseleave',  () => set(false));
  });

  // Drag-anywhere on the canvas as a fallback — feels great on iPad but only
  // engages when the player touches the play area (not while using the D-pad).
  let touchTarget = null;
  let dragTouchId = null;
  function canvasToLogical(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const px = (clientX - rect.left) * (canvas.width / rect.width);
    const py = (clientY - rect.top)  * (canvas.height / rect.height);
    return { x: (px - offX) / scale, y: (py - offY) / scale };
  }
  function onCanvasTouchStart(e) {
    if (state !== PLAYING && state !== WAVE_BANNER) return;
    if (dragTouchId !== null) return;
    const t = e.changedTouches[0];
    dragTouchId = t.identifier;
    const p = canvasToLogical(t.clientX, t.clientY);
    touchTarget = { x: p.x, y: Math.max(60, p.y - 50) };
    e.preventDefault();
  }
  function onCanvasTouchMove(e) {
    if (dragTouchId === null) return;
    for (const t of e.changedTouches) {
      if (t.identifier === dragTouchId) {
        const p = canvasToLogical(t.clientX, t.clientY);
        touchTarget.x = p.x;
        touchTarget.y = Math.max(60, p.y - 50);
        e.preventDefault();
        return;
      }
    }
  }
  function onCanvasTouchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === dragTouchId) { dragTouchId = null; touchTarget = null; return; }
    }
  }
  canvas.addEventListener('touchstart', onCanvasTouchStart, { passive: false });
  canvas.addEventListener('touchmove',  onCanvasTouchMove,  { passive: false });
  canvas.addEventListener('touchend',   onCanvasTouchEnd);
  canvas.addEventListener('touchcancel',onCanvasTouchEnd);

  // Mouse drag on desktop (optional alternative to keyboard)
  let mouseDown = false;
  canvas.addEventListener('mousedown', (e) => {
    if (state !== PLAYING && state !== WAVE_BANNER) return;
    mouseDown = true;
    const p = canvasToLogical(e.clientX, e.clientY);
    touchTarget = { x: p.x, y: p.y };
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    const p = canvasToLogical(e.clientX, e.clientY);
    touchTarget.x = p.x; touchTarget.y = p.y;
  });
  window.addEventListener('mouseup', () => { mouseDown = false; touchTarget = null; });

  // ───── menu wiring ─────
  const titleOverlay  = document.getElementById('titleOverlay');
  const pauseOverlay  = document.getElementById('pauseOverlay');
  const endOverlay    = document.getElementById('endOverlay');
  const startBtn      = document.getElementById('startBtn');
  const resumeBtn     = document.getElementById('resumeBtn');
  const quitBtn       = document.getElementById('quitBtn');
  const againBtn      = document.getElementById('againBtn');
  const endQuitBtn    = document.getElementById('endQuitBtn');
  const pauseBtn      = document.getElementById('pauseBtn');
  const bombBtn       = document.getElementById('bombBtn');
  const endTitle      = document.getElementById('endTitle');
  const endSub        = document.getElementById('endSub');
  const endHi         = document.getElementById('endHi');

  function updateTitleSub() {
    const sub = document.getElementById('titleSub');
    if (!sub) return;
    if (p2Joined && !menuP2Ready)       sub.textContent = 'P2: PICK YOUR PILOT';
    else if (p2Joined && !menuP1Ready)  sub.textContent = 'P1: PRESS ✕ WHEN READY';
    else                                sub.textContent = 'PICK YOUR PILOT';
  }

  function renderPilots() {
    const root = document.getElementById('pilots');
    root.innerHTML = '';
    for (const id of PILOT_ORDER) {
      const f = PILOTS[id];
      const hi = hiscores[id] || 0;
      const isP1 = pilotId === id;
      const isP2 = p2Joined && p2PilotId === id;
      const card = document.createElement('div');
      card.className = 'pilot-card' + (isP1 ? ' selected' : '') + (isP2 ? ' p2sel' : '');
      card.style.setProperty('--c', f.color);
      card.style.setProperty('--skin', f.skinColor);
      if (f.hair === 'long') {
        card.setAttribute('data-hair', 'long');
        card.style.setProperty('--hair', f.hairColor || '#5a2a08');
      }
      card.innerHTML = `
        <div class="card-hair"></div>
        <div class="face"></div>
        <div class="name">${f.name}</div>
        ${hi > 0 ? `<div class="hi">HI ${hi}</div>` : ''}
        ${isP1 && p2Joined ? `<div class="ptag">P1${menuP1Ready ? ' ✓' : ''}</div>` : ''}
        ${isP2 ? `<div class="ptag p2">P2${menuP2Ready ? ' ✓' : ''}</div>` : ''}
      `;
      card.addEventListener('click', () => {
        // touch / mouse belong to P1
        if (menuP1Ready) return;
        ensureAudio();
        pilotId = id;
        renderPilots();
        sfx.shot();
      });
      root.appendChild(card);
    }
    updateTitleSub();
  }
  renderPilots();

  function syncBombBtn() {
    const b = players[0] ? players[0].bombs : 0;
    bombBtn.textContent = b > 0 ? `BOMB ${b}` : 'BOMB';
    bombBtn.classList.toggle('empty', b <= 0);
  }

  function startGame() {
    ensureAudio();
    menuP1Ready = false; menuP2Ready = false;
    resetGame();
    syncBombBtn();
    titleOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    document.body.classList.add('in-match');
    document.body.classList.remove('paused');
    startWave(1);
  }
  startBtn.addEventListener('click', () => {
    // DOM START = P1 confirm. Solo it launches straight away; with P2 joined
    // it marks P1 ready and waits for P2's confirm.
    if (!p2Joined) { startGame(); return; }
    menuP1Ready = true;
    renderPilots();
    if (menuP2Ready) startGame();
  });

  function togglePause() {
    if (state === MENU || state === DEAD || state === VICTORY) return;
    if (state === PAUSED) {
      state = _resumeState || PLAYING;
      _resumeState = null;
      pauseOverlay.classList.add('hidden');
      document.body.classList.remove('paused');
    } else {
